<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 文件管理器</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com/3.3.3"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* CSS Variables for Theming (Light Mode Default) */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --glass-blur: blur(12px);
            --primary-color: #4f46e5; /* Indigo-600 */
            --text-primary: #1e293b; /* Slate-800 */
            --text-secondary: #475569; /* Slate-600 */
            --body-bg-start: #f3f4f6; /* Gray-100 */
            --body-bg-end: #e5e7eb; /* Gray-200 */
            --dialog-bg: rgba(255, 255, 255, 0.98);
            --dialog-border: rgba(0, 0, 0, 0.08);
            --dialog-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            --glass-btn-hover-bg: rgba(255, 255, 255, 0.3);
            --glass-btn-active-shadow: 0 2px 8px 0 rgba(31, 38, 135, 0.1);
            --glass-input-focus-shadow: 0 0 0 2px rgba(79, 70, 229, 0.3);
            --glass-input-placeholder: rgba(71, 85, 105, 0.6);
            --file-item-hover-bg: rgba(255, 255, 255, 0.3);
            --file-item-selected-bg: rgba(79, 70, 229, 0.2);
            --file-item-selected-border: rgba(79, 70, 229, 0.3);
            --context-menu-bg: rgba(255, 255, 255, 0.95);
            --context-menu-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            --context-menu-item-hover-bg: rgba(0, 0, 0, 0.05);
            --context-menu-divider: rgba(0, 0, 0, 0.1);
            --user-menu-bg: rgba(255, 255, 255, 0.95);
            --user-menu-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            --user-menu-item-hover-bg: rgba(0, 0, 0, 0.05);
            --user-menu-divider: rgba(0, 0, 0, 0.1);
            --scrollbar-track: rgba(255, 255, 255, 0.2);

            /* Specific color overrides for icons/text that use Tailwind classes */
            --color-red-500: #ef4444;
            --color-green-500: #22c55e;
            --color-blue-500: #3b82f6;
            --color-purple-500: #a855f7;
            --color-amber-500: #f59e0b;
            --color-violet-500: #8b5cf6;
            --color-indigo-600: #4f46e5;
            --color-emerald-500: #10b981;
            --color-gray-400: #9ca3af;
            --color-gray-500: #6b7280;
            --color-gray-600: #4b5563;
            --color-gray-700: #374151;
            --color-gray-800: #1f2937;
        }

        /* Dark Mode */
        body.theme-dark {
            --glass-bg: rgba(0, 0, 0, 0.2);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --primary-color: #8b5cf6; /* Violet-500 for dark mode primary */
            --text-primary: #e2e8f0; /* Slate-200 */
            --text-secondary: #a0aec0; /* Gray-400 */
            --body-bg-start: #1a202c; /* Gray-900 */
            --body-bg-end: #2d3748; /* Gray-800 */
            --dialog-bg: rgba(30, 41, 59, 0.98); /* Slate-800 */
            --dialog-border: rgba(255, 255, 255, 0.1);
            --dialog-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            --glass-btn-hover-bg: rgba(255, 255, 255, 0.1);
            --glass-btn-active-shadow: 0 2px 8px 0 rgba(0, 0, 0, 0.2);
            --glass-input-focus-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3); /* Violet-500 */
            --glass-input-placeholder: rgba(160, 174, 192, 0.6); /* Gray-400 */
            --file-item-hover-bg: rgba(255, 255, 255, 0.1);
            --file-item-selected-bg: rgba(139, 92, 246, 0.2); /* Violet-500 */
            --file-item-selected-border: rgba(139, 92, 246, 0.3);
            --context-menu-bg: rgba(30, 41, 59, 0.95);
            --context-menu-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            --context-menu-item-hover-bg: rgba(255, 255, 255, 0.05);
            --context-menu-divider: rgba(255, 255, 255, 0.1);
            --user-menu-bg: rgba(30, 41, 59, 0.95);
            --user-menu-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --user-menu-item-hover-bg: rgba(255, 255, 255, 0.05);
            --user-menu-divider: rgba(255, 255, 255, 0.1);
            --scrollbar-track: rgba(0, 0, 0, 0.2);

            /* Adjust specific icons/elements for dark mode */
            --color-red-500: #f87171; /* Red-400 */
            --color-green-500: #4ade80; /* Green-400 */
            --color-blue-500: #60a5fa; /* Blue-400 */
            --color-purple-500: #c084fc; /* Purple-400 */
            --color-amber-500: #fbbf24; /* Amber-400 */
            --color-violet-500: #a78bfa; /* Violet-400 */
            --color-indigo-600: #818cf8; /* Indigo-400 */
            --color-emerald-500: #34d399; /* Emerald-400 */
            --color-gray-400: #9ca3af;
            --color-gray-500: #a0aec0;
            --color-gray-600: #a0aec0;
            --color-gray-700: #e2e8f0;
            --color-gray-800: #e2e8f0;
        }

        .top-nav{
            position: relative;
            z-index: 1000;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-image, linear-gradient(135deg, var(--body-bg-start) 0%, var(--body-bg-end) 100%));
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 100px;
            margin: 0;
            background-attachment: fixed;
            transition: background-color 0.3s ease, color 0.3s ease; /* Smooth transition for theme change */
        }
        
        /* Glassmorphism Effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 16px;
        }
        
        .glass-panel {
            background: var(--glass-bg); /* Use glass-bg for consistency */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 16px;
        }
        
        /* Button Styles */
        .glass-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 16px 0 rgba(31, 38, 135, 0.1); /* Keep original shadow for buttons */
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .glass-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(31, 38, 135, 0.2); /* Keep original shadow for buttons */
            background: var(--glass-btn-hover-bg);
        }
        
        .glass-btn:active {
            transform: translateY(0);
            box-shadow: var(--glass-btn-active-shadow);
        }
        
        .glass-btn-primary {
            background: var(--primary-color);
            color: white;
            border: 1px solid var(--glass-border); /* Use glass-border for consistency */
        }
        
        .glass-btn-primary:hover {
            background: var(--primary-color); /* Hover effect for primary button */
            opacity: 0.9; /* Slightly darken primary button on hover */
        }
        
        /* Input Styles */
        .glass-input {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .glass-input:focus {
            outline: none;
            box-shadow: var(--glass-input-focus-shadow);
            background: var(--glass-btn-hover-bg); /* Use glass-btn-hover-bg for consistency */
        }
        
        .glass-input::placeholder {
            color: var(--glass-input-placeholder);
        }
        
        /* File List Item */
        .file-item {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .file-item:hover {
            background: var(--file-item-hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(31, 38, 135, 0.1);
        }
        
        .file-item.selected {
            background: var(--file-item-selected-bg);
            border-color: var(--file-item-selected-border);
        }
        
        /* File Type Icons */
        .file-icon {
            margin-right: 12px;
            filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.1));
        }
        
        .folder-icon { color: var(--color-amber-500); }
        .archive-icon { color: var(--color-violet-500); }
        .image-icon { color: var(--color-red-500); } /* Adjusted to pink-400 like color */
        .code-icon { color: var(--color-blue-500); }
        .text-icon { color: var(--color-gray-500); }
        .fa-github { color: var(--text-primary) !important; } /* Ensure GitHub icon adapts */

        /* Toolbar */
        .toolbar {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .toolbar.hidden {
            transform: translateY(100px);
            opacity: 0;
            pointer-events: none;
        }
        
        /* Dialogs */
        .dialog-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 999;
        }

        .dialog-content {
            background: var(--dialog-bg); 
            border-radius: 10px; 
            padding: 14px 16px; 
            width: 85%;
            max-width: 340px; 
            box-shadow: var(--dialog-shadow);
        }

        /* Dialog Title */
        .dialog-content h3 {
            font-size: 1.1rem;
            margin-bottom: 0.6rem;
            color: var(--text-primary);
        }

        /* Dialog Input */
        .dialog-input {
            background: var(--dialog-bg); 
            border: 1px solid var(--dialog-border);
            border-radius: 5px;
            padding: 8px 12px; 
            font-size: 0.85rem;
            height: 36px; 
            margin-bottom: 0.6rem;
            color: var(--text-primary);
        }

        /* Dialog Button Container */
        .dialog-buttons {
            margin-top: 0.8rem;
            gap: 6px; 
        }

        /* Dialog Button */
        .dialog-btn {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 5px;
        }

        /* Mobile Adaptation */
        @media (max-width: 480px) {
            .dialog-content {
                padding: 12px 14px;
                max-width: 300px;
            }
            
            .dialog-input {
                padding: 7px 10px;
                height: 34px;
            }
            
            .dialog-btn {
                padding: 5px 10px;
            }
        }
        
        /* Loading Animation */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        
        /* Breadcrumb Navigation */
        .breadcrumb {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .breadcrumb-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: color 0.2s;
            color: var(--text-secondary); /* Default color for breadcrumb items */
        }
        
        .breadcrumb-item:hover {
            color: var(--primary-color);
        }
        
        .breadcrumb-separator {
            margin: 0 8px;
            color: var(--text-secondary);
        }
        
        /* Context Menu */
        .context-menu {
            position: absolute;
            z-index: 1000;
            background: var(--context-menu-bg);
            border-radius: 12px;
            box-shadow: var(--context-menu-shadow);
            min-width: 200px;
            overflow: hidden;
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
            pointer-events: none;
        }
        
        .context-menu.visible {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        
        .context-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
            color: var(--text-primary);
        }
        
        .context-menu-item:hover {
            background: var(--context-menu-item-hover-bg);
        }
        
        .context-menu-item i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .context-menu-divider {
            height: 1px;
            background: var(--context-menu-divider);
            margin: 4px 0;
        }
        
        /* Batch Operation Toolbar */
        .batch-toolbar {
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            background: rgba(79, 70, 229, 0.9); /* Primary color with opacity */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            border-radius: 24px;
            padding: 8px 16px;
            color: white;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
            margin: 0 auto;
            width: fit-content;
            max-width: 90%;
        }
        
        .batch-toolbar.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .batch-toolbar-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 12px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        
        .batch-toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .batch-count {
            margin-right: 12px;
            display: flex;
            align-items: center;
        }
        
        /* User Menu */
        .user-menu {
            position: relative;
            display: inline-block;
        }
        
        .user-menu-btn {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .user-menu-content {
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 8px;
            background: var(--user-menu-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--user-menu-shadow);
            border-radius: 12px;
            min-width: 180px;
            z-index: 1100;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            pointer-events: none;
           
        }
        
        .user-menu-content.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        .user-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
            color: var(--text-primary);
        }
        
        .user-menu-item:hover {
            background: var(--user-menu-item-hover-bg);
        }
        
        .user-menu-item i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .user-menu-divider {
            height: 1px;
            background: var(--user-menu-divider);
            margin: 4px 0;
        }
        
        /* Responsive Adjustments */
        @media (max-width: 640px) {
            .glass {
                border-radius: 12px;
            }
            
            .file-item {
                padding: 12px;
            }
            
            .toolbar {
                padding: 8px;
                border-radius: 20px;
            }
            
            .breadcrumb {
                font-size: 14px;
            }
            
            .batch-toolbar {
                bottom: 70px;
                padding: 6px 12px;
            }
            
            .batch-toolbar-btn {
                padding: 6px 8px;
                font-size: 14px;
            }
        }
        
        /* Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-color);
            opacity: 0.8;
        }
        
        /* Build Status Notification */
        .build-status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            max-width: 300px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .build-status.hidden {
            transform: translateY(-20px);
            opacity: 0;
            pointer-events: none;
        }
        
        /* Build APP Context Menu Item Style */
        .context-build-app {
            color: var(--color-blue-500); /* Blue for action item */
        }

        /* General color overrides for Tailwind classes to use CSS variables */
        .text-red-500 { color: var(--color-red-500); }
        .text-green-500 { color: var(--color-green-500); }
        .text-blue-500 { color: var(--color-blue-500); }
        .text-purple-500 { color: var(--color-purple-500); }
        .text-amber-500 { color: var(--color-amber-500); }
        .text-violet-500 { color: var(--color-violet-500); }
        .text-indigo-600 { color: var(--color-indigo-600); }
        .text-emerald-500 { color: var(--color-emerald-500); }
        .text-gray-400 { color: var(--color-gray-400); }
        .text-gray-500 { color: var(--color-gray-500); }
        .text-gray-600 { color: var(--color-gray-600); }
        .text-gray-700 { color: var(--color-gray-700); }
        .text-gray-800 { color: var(--color-gray-800); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">
    <!-- Authentication Screen -->
    <div id="auth-screen" class="flex flex-col items-center justify-center min-h-screen">
        <div class="glass-panel p-8 w-full max-w-md mx-auto">
            <div class="text-center mb-8">
                <i class="fab fa-github text-5xl mb-4" style="color: var(--primary-color);"></i>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">GitHub 文件管理器</h1>
                <p class="text-gray-600">使用您的 GitHub Token 登录</p>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 mb-2 font-medium">GitHub 个人访问令牌</label>
                <input type="text" id="github-token" placeholder="输入您的 GitHub Token" 
                       class="glass-input mb-1">
                <p id="token-error" class="text-red-500 text-sm hidden"></p>
            </div>
            
            <button id="auth-btn" class="glass-btn glass-btn-primary w-full py-3 font-medium flex items-center justify-center">
                <span id="auth-btn-text">认证并继续</span>
                <i id="auth-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
            </button>
            
            <div class="mt-8 text-sm text-gray-600">
                <p class="font-medium mb-2">如何获取 Token？</p>
                <ol class="list-decimal pl-5 space-y-1">
                    <li>登录 GitHub 账户</li>
                    <li>访问 开发者设置</li>
                    <li>创建新的个人访问令牌</li>
                    <li>勾选 repo 权限</li>
                </ol>
            </div>
        </div>
    </div>
    
    <!-- Main Screen -->
    <div id="main-screen" class="hidden flex-col h-full max-w-6xl mx-auto w-full">
        <!-- Top Navigation Bar -->
        <div class="top-nav glass-panel flex items-center p-4 mb-4">
            <div id="current-path" class="text-lg font-semibold truncate flex-1">
                <div class="breadcrumb">
                    <div class="breadcrumb-item" onclick="loadRepositories()">
                        <i class="fab fa-github mr-1"></i>
                        <span>我的仓库</span>
                    </div>
                </div>
            </div>
            
            <!-- User Menu -->
            <div class="user-menu">
                <div id="user-menu-btn" class="user-menu-btn glass-btn p-2">
                    <i class="fas fa-user-circle text-lg"></i>
                </div>
                <div id="user-menu-content" class="user-menu-content">
                    <div id="user-info" class="user-menu-item">
                        <i class="fas fa-user"></i>
                        <span id="username"></span>
                    </div>
                    <div class="user-menu-divider"></div>
                    <div id="appearance-settings-btn" class="user-menu-item">
                        <i class="fas fa-palette"></i>
                        <span>外观设置</span>
                    </div>
                    <div class="user-menu-divider"></div>
                    <div id="logout-btn" class="user-menu-item">
                        <i class="fas fa-sign-out-alt text-red-500"></i>
                        <span class="text-red-500">退出登录</span>
                    </div>
                </div>
            </div>
        </div>

        
        <!-- File List Area -->
        <div class="flex-1 overflow-y-auto">
            <div id="loading" class="flex justify-center items-center h-64">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
            </div>
            
            <div id="file-list" class="grid gap-3 hidden">
                <!-- Dynamically generated file list -->
            </div>
            
            <div id="empty-state" class="hidden flex flex-col items-center justify-center h-64 text-gray-500">
                <i class="fas fa-folder-open text-5xl mb-4 opacity-50"></i>
                <p class="text-lg">当前目录为空</p>
            </div>
        </div>
        
        <!-- Bottom Toolbar -->
        <div id="toolbar" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 flex gap-3 p-3 toolbar">
            <button id="back-btn" class="glass-btn p-3 hidden" title="返回">
                <i class="fas fa-arrow-left text-indigo-600"></i>
            </button>
            <button id="refresh-btn" class="glass-btn p-3" title="刷新">
                <i class="fas fa-sync-alt text-emerald-500"></i>
            </button>
            <button id="new-repo-btn" class="glass-btn p-3" title="新建仓库">
                <i class="fas fa-plus text-blue-500"></i>

        // Optimized scroll event handler
        function handleScroll() {
            const currentScrollPosition = window.pageYOffset || document.documentElement.scrollTop;
            const scrollDelta = currentScrollPosition - lastScrollPosition;
            
            // Ignore minor scrolls below threshold
            if (Math.abs(scrollDelta) < SCROLL_THRESHOLD) {
                return;
            }
            
            // Determine scroll direction
            const scrollingDown = scrollDelta > 0;
            
            // Update last scroll position
            lastScrollPosition = currentScrollPosition;
            
            // Clear previous timer
            clearTimeout(scrollTimeout);
            
            // If direction changed, update UI immediately
            if (lastScrollDirection !== scrollingDown) {
                updateToolbarVisibility(scrollingDown);
            }
            
            // Set new timer
            scrollTimeout = setTimeout(() => {
                isScrolling = false;
                showToolbar();
            }, SCROLL_DELAY);
            
            // Only process if state changed or initially scrolling
            if (!isScrolling || lastScrollDirection !== scrollingDown) {
                isScrolling = true;
                lastScrollDirection = scrollingDown;
                updateToolbarVisibility(scrollingDown);
            }
        }
        
        // Update toolbar visibility
        function updateToolbarVisibility(scrollingDown) {
            if (scrollingDown) {
                hideToolbar();
            } else {
                showToolbar();
            }
        }

        // Verify Token
        async function verifyToken(token = githubToken) {
            try {
                // Show loading state
                authBtnText.textContent = '认证中...';
                authSpinner.classList.remove('hidden');
                authBtn.disabled = true;
                
                // Set timeout
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                // Send verification request
                const response = await fetch('https://api.github.com/user', {
                    signal: controller.signal,
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    console.error('GitHub API Error:', errorData);
                    
                    let errorMessage = '认证失败';
                    if (response.status === 401) {
                        errorMessage = 'Token 无效或已过期';
                    } else if (response.status === 403) {
                        errorMessage = '权限不足，请检查 Token 权限';
                    } else {
                        errorMessage = `服务器错误: ${response.status}`;
                    }
                    
                    throw new Error(errorMessage);
                }
                
                // Authentication successful
                const userData = await response.json();
                console.log('Authentication successful:', userData);
                
                githubToken = token;
                currentUser = userData;
                localStorage.setItem('github_token', token);
                showToast(`欢迎: ${userData.login || '用户'}！`);
                showMainScreen();
                loadRepositories();
                
                // Update user info
                usernameElement.textContent = userData.login;
                
            } catch (error) {
                console.error('Authentication error:', error);
                
                let errorMessage = error.message;
                if (error.name === 'AbortError') {
                    errorMessage = '请求超时，请检查网络连接';
                }
                
                showTokenError(errorMessage);
                showToast(errorMessage);
                
            } finally {
                // Reset button state
                authBtnText.textContent = '认证并继续';
                authSpinner.classList.add('hidden');
                authBtn.disabled = false;
            }
        }

        // Load repositories list
        async function loadRepositories() {
            showLoading();
            currentPath = '';
            currentRepo = '';
            updateBreadcrumb([]);
            
            // Update button states
            backBtn.classList.add('hidden');
            uploadBtn.classList.add('hidden');
            newFolderBtn.classList.add('hidden');
            selectBtn.classList.add('hidden');
            staticSiteBtn.classList.add('hidden');
            newRepoBtn.classList.remove('hidden');
            forkRepoBtn.classList.remove('hidden'); // Show fork button

            try {
                // Use GraphQL API to get repository list
                const response = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: {
                        'Authorization': `bearer ${githubToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        query: `
                            query {
                                viewer {
                                    repositories(first: 100, ownerAffiliations: [OWNER], orderBy: {field: NAME, direction: ASC}) {
                                        nodes {
                                            name
                                            owner {
                                                login
                                            }
                                            isPrivate
                                            description
                                            updatedAt
                                        }
                                    }
                                }
                            }
                        `
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch repository list');
                }
                
                const data = await response.json();
                const repos = data.data.viewer.repositories.nodes;
                
                renderFileList(repos.map(repo => ({
                    name: repo.name,
                    type: 'repo',
                    path: `${repo.owner.login}/${repo.name}`,
                    private: repo.isPrivate,
                    description: repo.description,
                    updatedAt: repo.updatedAt
                })));
            } catch (error) {
                console.error('Error loading repository list:', error);
                showToast('加载失败: ' + error.message);
                showEmptyState();
            }
        }
        
        // Load repository contents
        async function loadRepositoryContents(repo, path = '') {
            showLoading();
            currentRepo = repo;
            currentPath = path;
            
            // Update button states
            backBtn.classList.remove('hidden');
            uploadBtn.classList.remove('hidden');
            newFolderBtn.classList.remove('hidden');
            selectBtn.classList.remove('hidden');
            staticSiteBtn.classList.add('hidden');
            newRepoBtn.classList.add('hidden');
            forkRepoBtn.classList.add('hidden'); // Hide fork button
            
            // Update breadcrumb navigation
            const pathParts = path ? path.split('/') : [];
            updateBreadcrumb([repo, ...pathParts]);
            
            try {
                // Use GraphQL API to get repository contents
                const response = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: {
                        'Authorization': `bearer ${githubToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        query: `
                            query {
                                repository(owner: "${repo.split('/')[0]}", name: "${repo.split('/')[1]}") {
                                    object(expression: "HEAD:${path}") {
                                        ... on Tree {
                                            entries {
                                                name
                                                type
                                                object {
                                                    ... on Blob {
                                                        byteSize
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        `
                    })
                });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch repository contents');
                }
                
                const data = await response.json();
                
                if (!data.data.repository.object) {
                    showEmptyState();
                    return;
                }
                
                const contents = data.data.repository.object.entries.map(entry => ({
                    name: entry.name,
                    type: entry.type === 'tree' ? 'dir' : 'file',
                    size: entry.object?.byteSize || 0,
                    path: path ? `${path}/${entry.name}` : entry.name,
                    download_url: entry.type === 'blob' ? 
                        `https://raw.githubusercontent.com/${repo}/HEAD/${path ? path + '/' : ''}${entry.name}` : null
                }));
                
                currentFiles = contents;
                
                const sortedContents = [...contents].sort((a, b) => {
                    if (a.type === b.type) {
                        return a.name.localeCompare(b.name);
                    }
                    return a.type === 'dir' ? -1 : 1;
                });
                
                renderFileList(sortedContents);
                
                // Check for index.html to show static site button
                const hasIndexHtml = contents.some(file =>

        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();

        // Delete file
        async function deleteFile(fileInfo) {
            try {
                // If it's a batch delete
                if (Array.isArray(fileInfo)) {
                    return deleteFiles(fileInfo);
                }
                
                // Get file SHA
                const shaResponse = await fetch(
                    `https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${fileInfo.name}`,
                    {
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                if (!shaResponse.ok) {
                    throw new Error('Failed to get file info');
                }
                
                const shaData = await shaResponse.json();
                const sha = shaData.sha;

                // Delete file
                const deleteResponse = await fetch(
                    `https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${fileInfo.name}`,
                    {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({
                            message: `Delete ${fileInfo.name}`,
                            sha: sha
                        })
                    }
                );

                if (!deleteResponse.ok) {
                    const errorData = await deleteResponse.json();
                    throw new Error(errorData.message || 'Failed to delete file');
                }
                
                showToast('文件删除成功');
                loadRepositoryContents(currentRepo, currentPath);
                
            } catch (error) {
                console.error('Error deleting file:', error);
                showToast('删除文件失败: ' + error.message);
            }
        }

                        const shaResponse = await fetch(
                            `https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${file.name}`,
                            {
                                headers: {
                                    'Authorization': `token ${githubToken}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                }
                            }
                        );
                        
                        if (!shaResponse.ok) {
                            throw new Error('Failed to get file info');
                        }
                        
                        const shaData = await shaResponse.json();
                        const sha = shaData.sha;

                        // Delete file
                        const deleteResponse = await fetch(
                            `https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${file.name}`,
                            {
                                method: 'DELETE',
                                headers: {
                                    'Authorization': `token ${githubToken}`,
                                    'Accept': 'application/vnd.github.v3+json'
                                },

        async function uploadSelectedFile() {
            if (!fileInput.files || fileInput.files.length === 0) {
                showToast('请先选择文件');
                return;
            }

            try {
                const files = Array.from(fileInput.files);
                let successfulUploads = 0;
                let failedUploads = 0;
                
                // Show upload progress
                const progressToast = document.createElement('div');
                progressToast.id = 'upload-progress';
                progressToast.className = 'fixed bottom-20 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-3 rounded-full text-sm font-medium';
                progressToast.innerHTML = `准备上传 ${files.length} 个文件...`;

                // Upload each file sequentially
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    try {
                        progressToast.innerHTML = `正在上传 ${i+1}/${files.length}: ${file.name}...`;
                        
                        // Upload file and wait for completion
                        await uploadSingleFile(file);
                        successfulUploads++;
                        
                        // Small delay to avoid rate limits
                        if (i < files.length - 1) {
                            await new Promise(resolve => setTimeout(resolve, 500));
                        }
                    } catch (error) {
                        console.error(`Failed to upload file ${file.name}:`, error);
                        failedUploads++;
                        
                        // If rate limit error, wait and retry
                        if (error.message.includes('API rate limit')) {
                            progressToast.innerHTML = `遇到速率限制，等待60秒后继续...`;
                            await new Promise(resolve => setTimeout(resolve, 60000));
                            i--; // Retry current file
                            continue;
                        }
                        
                        // For other errors, continue to next file
                        continue;
                    }
                }

                // Remove progress notification
                document.body.removeChild(progressToast);
                
                // Show final result
                if (failedUploads === 0) {
                    showToast(`成功上传 ${successfulUploads} 个文件`);
                } else {
                    showToast(`上传完成: ${successfulUploads} 成功, ${failedUploads} 失败`);

                showToast('上传过程中发生错误: ' + error.message);
            } finally {
                fileInput.value = '';
            }
        }

        // Upload single file (optimized)
        async function uploadSingleFile(file) {
            try {
                // 1. Read file content as Base64
                const base64Content = await readFileAsBase64(file);
                
                // 2. Construct file path
                const filePath = currentPath ? `${currentPath}/${file.name}` : file.name;
                const encodedPath = encodeGitHubPath(filePath);
                
                // 3. Check if file exists and get SHA
                const sha = await getFileShaIfExists(encodedPath);
                
                // 4. Construct upload data
                const uploadData = {
                    message: `Upload ${file.name}`,
                    content: base64Content,
                    ...(sha && { sha }) // Only include sha if it exists
                };
                
                // 5. Execute upload
                const response = await fetch(
                    `https://api.github.com/repos/${currentRepo}/contents/${encodedPath}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(uploadData)
                    }
                );
                
                if (!response.ok) {
                    const errorData = await response.json();
                    
                    // Handle rate limit
                    if (response.status === 403 && errorData.message.includes('API rate limit')) {
                        const resetTime = new Date(response.headers.get('x-ratelimit-reset') * 1000);
                        throw new Error(`API速率限制，请等待到 ${resetTime.toLocaleTimeString()}`);
                    }
                    
                    throw new Error(errorData.message || '上传失败');
                }
                
                return { file: file.name, status: 'success' };
            } catch (error) {
                console.error(`Failed to upload file ${file.name}:`, error);
                throw error;
            }
        }

        // Helper function: Read file as Base64
        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const arrayBuffer = reader.result;
                    const binaryString = Array.from(new Uint8Array(arrayBuffer))
                        .map(b => String.fromCharCode(b))
                        .join('');
                    resolve(btoa(binaryString));
                };
                reader.onerror = () => reject(new Error('Failed to read file'));
                reader.readAsArrayBuffer(file);
            });
        }

        // Helper function: Check if file exists and return SHA
        async function getFileShaIfExists(filePath) {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${currentRepo}/contents/${filePath}`,
                    {
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );
                
                if (response.ok) {
                    const data = await response.json();
                    return data.sha;
                } else if (response.status === 404) {
                    return null; // File does not exist
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Failed to check file status');
                }
            } catch (error) {
                console.error('Error getting SHA:', error);
                throw error;
            }
        }

        // Helper function: Encode GitHub path
        function encodeGitHubPath(path) {
            return path.split('/').map(encodeURIComponent).join('/');
        }

            staticSiteDialog.classList.add('opacity-100', 'pointer-events-auto');
            document.getElementById('static-site-content').classList.add('scale-100');
            document.getElementById('static-site-content').classList.remove('scale-90');
        }

        function hideStaticSiteDialog() {
            staticSiteDialog.classList.remove('opacity-100', 'pointer-events-auto');
            document.getElementById('static-site-content').classList.add('scale-90');
            document.getElementById('static-site-content').classList.remove('scale-100');
        }

        async function checkPagesStatus(repo) {
            try {
                const [owner, repoName] = repo.split('/');
                const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}/pages`, {
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'built' || data.status === 'building') {
                        pagesStatus.classList.remove('hidden');
                        staticSiteEnable.classList.add('hidden');
                        pagesUrl.href = data.html_url;
                        pagesUrl.textContent = data.html_url;
                        
                        // Set current configuration
                        pagesBranch.value = data.source.branch;
                        pagesFolder.value = data.source.path === '/docs' ? '/docs' : '/';
                    } else {
                        pagesStatus.classList.add('hidden');
                        staticSiteEnable.classList.remove('hidden');
                    }
                } else {
                    pagesStatus.classList.add('hidden');
                    staticSiteEnable.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error checking Pages status:', error);
                pagesStatus.classList.add('hidden');
                staticSiteEnable.classList.remove('hidden');
            }
        }

        async function enableGitHubPages() {
            try {
                const [owner, repoName] = currentRepo.split('/');
                const branch = pagesBranch.value;
                const path = pagesFolder.value === '/docs' ? '/docs' : '/';
                
                const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}/pages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        source: {
                            branch: branch,
                            path: path
                        }
                    })
                });
                
                if (response.ok) {
                    showToast('静态网站已启用，构建可能需要几分钟');
                    hideStaticSiteDialog();
                    
                    // Check build status after a delay
                    setTimeout(() => {
                        checkPagesStatus(currentRepo);
                    }, 5000);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Failed to enable static website');
                }
            } catch (error) {
                console.error('Error enabling static website:', error);
                showToast('启用静态网站失败: ' + error.message);
            }
        }
        
        // Build APP functionality
        async function buildApp(repoInfo) {
            try {
                const [owner, repo] = repoInfo.path.split('/');
                
                // Show build status
                buildStatusEl.classList.remove('hidden');
                buildIcon.className = 'fas fa-cog animate-spin text-blue-500 mr-2';
                buildMessage.textContent = '正在启动构建任务...';
                
                // Set progress bar
                progressBar.style.width = '0%';
                progressText.textContent = '0%';
                
                // Trigger GitHub Actions workflow
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/test.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main', // Use main branch
                        inputs: {
                            environment: 'production',
                            version: '1.0.0'
                        }
                    })
                });
                
                if (response.status === 204) {
                    // Workflow triggered successfully
                    buildMessage.textContent = '构建任务已启动！正在监控进度...';
                    
                    // Start monitoring build progress
                    monitorBuildProgress(owner, repo);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Failed to trigger build');
                }
            } catch (error) {
                console.error('Error building APP:', error);
                buildIcon.className = 'fas fa-times-circle text-red-500 mr-2';
                buildMessage.textContent = '构建失败: ' + error.message;
            }
        }
        
        // Monitor build progress
        async function monitorBuildProgress(owner, repo) {
            // Clear previous timer
            clearInterval(buildTimer);
            
            // Set progress bar animation
            let progress = 0;
            const progressInterval = setInterval(() => {
                if (progress < 95) {
                    progress += 5;
                    progressBar.style.width = `${progress}%`;
                    progressText.textContent = `${progress}%`;
                }
            }, 2000);
            
            // Check build status every 10 seconds
            buildTimer = setInterval(async () => {
                try {
                    const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?event=workflow_dispatch`, {
                        headers: {
                            'Authorization': `token ${githubToken}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    });
                    
                    if (!response.ok) {
                        throw new Error('Failed to get build status');
                    }
                    
                    const data = await response.json();
                    const latestRun = data.workflow_runs[0];
                    
                    if (!latestRun) {
                        return;
                    }
                    
                    // Update build status
                    buildStatus = latestRun.status;
                    
                    switch (latestRun.status) {
                        case 'completed':
                            clearInterval(progressInterval);
                            clearInterval(buildTimer);
                            
                            if (latestRun.conclusion === 'success') {
                                progressBar.style.width = '100%';
                                progressText.textContent = '100%';
                                buildIcon.className = 'fas fa-check-circle text-green-500 mr-2';
                                buildMessage.innerHTML = '构建成功！<br>APK文件可在仓库的Artifacts中下载';
                            } else {
                                buildIcon.className = 'fas fa-times-circle text-red-500 mr-2';
                                buildMessage.textContent = `构建失败: ${latestRun.conclusion}`;
                            }
                            break;
                            
                        case 'in_progress':
                            buildMessage.textContent = '构建正在进行中...';
                            break;
                            
                        case 'queued':
                            buildMessage.textContent = '构建任务排队中...';
                            break;
                    }
                } catch (error) {
                    console.error('Error monitoring build progress:', error);
                    clearInterval(progressInterval);
                    clearInterval(buildTimer);
                    buildIcon.className = 'fas fa-times-circle text-red-500 mr-2';
                    buildMessage.textContent = '监控失败: ' + error.message;
                }
            }, 10000);
        }
        
        // Fork repository function
        async function forkRepository(repoUrl) {
            try {
                // Extract owner and repo name from URL
                const urlPattern = /https:\/\/github\.com\/([^\/]+)\/([^\/]+)/i;
                const match = repoUrl.match(urlPattern);
                
                if (!match || match.length < 3) {
                    throw new Error('Invalid GitHub repository URL');
                }
                
                const owner = match[1];
                const repo = match[2];
                
                showToast('正在复刻仓库...');
                hideForkRepoDialog();
                
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/forks`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${githubToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.message || 'Failed to fork repository');
                }
                
                // Forking is asynchronous, wait for a while
                showToast('仓库复刻中，请稍后刷新查看...');
                
                // Auto-refresh after 30 seconds
                setTimeout(() => {
                    loadRepositories();
                }, 30000);
                
            } catch (error) {
                console.error('Error forking repository:', error);
                showToast('复刻仓库失败: ' + error.message);
            }
        }

        // Function to show appearance dialog
        function showAppearanceDialog() {
            appearanceDialog.classList.add('opacity-100', 'pointer-events-auto');
            document.getElementById('appearance-content').classList.add('scale-100');
            document.getElementById('appearance-content').classList.remove('scale-90');
            // Update theme buttons' active state
            const currentTheme = localStorage.getItem('theme') || 'light';
            if (currentTheme === 'light') {
                themeLightBtn.classList.add('glass-btn-primary');
                themeDarkBtn.classList.remove('glass-btn-primary');
            } else {
                themeLightBtn.classList.remove('glass-btn-primary');
                themeDarkBtn.classList.add('glass-btn-primary');
            }
        }

        // Function to hide appearance dialog
        function hideAppearanceDialog() {
            appearanceDialog.classList.remove('opacity-100', 'pointer-events-auto');
            document.getElementById('appearance-content').classList.add('scale-90');
            document.getElementById('appearance-content').classList.remove('scale-100');
        }

        // Function to apply theme
        function applyTheme(themeName) {
            document.body.classList.remove('theme-light', 'theme-dark');
            document.body.classList.add(`theme-${themeName}`);
            localStorage.setItem('theme', themeName);
            // Update theme buttons' active state
            if (themeName === 'light') {
                themeLightBtn.classList.add('glass-btn-primary');
                themeDarkBtn.classList.remove('glass-btn-primary');
            } else {
                themeLightBtn.classList.remove('glass-btn-primary');
                themeDarkBtn.classList.add('glass-btn-primary');
            }
        }

        // Function to apply background image
        function applyBackgroundImage(url) {
            document.body.style.setProperty('--bg-image', `url('${url}')`);
        }

        // Function to save background image URL
        function saveBackgroundImage(url) {
            localStorage.setItem('bg_image_url', url);
        }

        // Helper to hide user menu (needed when opening appearance dialog)
        function hideUserMenu() {
            userMenuContent.classList.remove('show');
        }
    </script>
