<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 文件管理器</title>
    <!-- Corrected CDN links for Tailwind CSS and Font Awesome -->
    <script src="https://cdn.tailwindcss.com/3.3.3"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* CSS Variables for Theming */
        :root {
            --bg-start: #f3f4f6;
            --bg-end: #e5e7eb;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --glass-blur: blur(12px);
            --primary-color: #4f46e5; /* indigo-600 */
            --primary-color-light: #6366f1; /* indigo-500 */
            --primary-color-dark: #4338ca; /* indigo-700 */
            --dialog-bg: rgba(255, 255, 255, 0.98);
            --dialog-border: rgba(0, 0, 0, 0.08);
            --file-item-bg: rgba(255, 255, 255, 0.2);
            --file-item-hover-bg: rgba(255, 255, 255, 0.3);
            --file-item-selected-bg: rgba(79, 70, 229, 0.2);
            --file-item-selected-border: rgba(79, 70, 229, 0.3);
            --toolbar-bg: rgba(255, 255, 255, 0.2);
            --toolbar-blur: blur(16px);
            --button-bg: rgba(255, 255, 255, 0.2);
            --button-hover-bg: rgba(255, 255, 255, 0.3);
            --button-border: rgba(255, 255, 255, 0.3);
            --input-bg: rgba(255, 255, 255, 0.2);
            --input-focus-bg: rgba(255, 255, 255, 0.3);
            --input-border: rgba(255, 255, 255, 0.3);
            --input-placeholder: rgba(71, 85, 105, 0.6);
            --context-menu-bg: rgba(255, 255, 255, 0.95);
            --context-menu-hover-bg: rgba(0, 0, 0, 0.05);
            --context-menu-divider: rgba(0, 0, 0, 0.1);
            --scrollbar-track: rgba(255, 255, 255, 0.2);
            --scrollbar-thumb: rgba(79, 70, 229, 0.5);
            --scrollbar-thumb-hover: rgba(79, 70, 229, 0.7);
        }

        /* Dark Mode Variables */
        .dark-mode {
            --bg-start: #1a202c; /* Darker background */
            --bg-end: #2d3748;
            --text-primary: #e2e8f0; /* Light text */
            --text-secondary: #a0aec0;
            --glass-bg: rgba(45, 55, 72, 0.3); /* Darker glass background */
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --primary-color: #6366f1; /* indigo-500 */
            --primary-color-light: #7f81f7;
            --primary-color-dark: #4f46e5;
            --dialog-bg: rgba(45, 55, 72, 0.98);
            --dialog-border: rgba(255, 255, 255, 0.1);
            --file-item-bg: rgba(45, 55, 72, 0.2);
            --file-item-hover-bg: rgba(45, 55, 72, 0.4);
            --file-item-selected-bg: rgba(79, 70, 229, 0.4);
            --file-item-selected-border: rgba(79, 70, 229, 0.5);
            --toolbar-bg: rgba(45, 55, 72, 0.2);
            --button-bg: rgba(45, 55, 72, 0.2);
            --button-hover-bg: rgba(45, 55, 72, 0.4);
            --button-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(45, 55, 72, 0.2);
            --input-focus-bg: rgba(45, 55, 72, 0.4);
            --input-border: rgba(255, 255, 255, 0.1);
            --input-placeholder: rgba(160, 174, 192, 0.6);
            --context-menu-bg: rgba(45, 55, 72, 0.95);
            --context-menu-hover-bg: rgba(255, 255, 255, 0.05);
            --context-menu-divider: rgba(255, 255, 255, 0.1);
            --scrollbar-track: rgba(45, 55, 72, 0.2);
            --scrollbar-thumb: rgba(79, 70, 229, 0.5);
            --scrollbar-thumb-hover: rgba(79, 70, 229, 0.7);
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 100px;
            margin: 0;
            background-attachment: fixed;
            background-size: cover; /* Ensures background image covers the entire body */
            background-position: center;
            transition: background-color 0.3s ease, color 0.3s ease; /* Smooth theme transition */
        }
        
        /* Apply GPU acceleration hints for smoother animations */
        .glass, .glass-panel, .glass-btn, .glass-input, .file-item, .toolbar, .dialog-content, .context-menu, .batch-toolbar, .user-menu-content, .build-status {
            will-change: transform, opacity, backdrop-filter;
        }

        .top-nav{
            position: relative;
            z-index: 1000;
        }
        
        /* Glassmorphism Effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 16px;
        }
        
        .glass-panel {
            background: var(--glass-bg); /* Unified with glass for consistency */
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 16px;
        }
        
        /* Button Styles */
        .glass-btn {
            background: var(--button-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--button-border);
            box-shadow: 0 4px 16px 0 rgba(31, 38, 135, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .glass-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(31, 38, 135, 0.2);
            background: var(--button-hover-bg);
        }
        
        .glass-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px 0 rgba(31, 38, 135, 0.1);
        }
        
        .glass-btn-primary {
            background: var(--primary-color);
            color: white;
            border: 1px solid var(--primary-color-light); /* Make border match primary color */
        }
        
        .glass-btn-primary:hover {
            background: var(--primary-color-dark);
        }
        
        /* Input Field Styles */
        .glass-input {
            background: var(--input-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .glass-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.3);
            background: var(--input-focus-bg);
        }
        
        .glass-input::placeholder {
            color: var(--input-placeholder);
        }
        
        /* File List Item Styles */
        .file-item {
            background: var(--file-item-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .file-item:hover {
            background: var(--file-item-hover-bg);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(31, 38, 135, 0.1);
        }
        
        .file-item.selected {
            background: var(--file-item-selected-bg);
            border-color: var(--file-item-selected-border);
        }
        
        /* File Type Icons */
        .file-icon {
            margin-right: 12px;
            filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.1));
        }
        
        .folder-icon {
            color: #f59e0b; /* amber-500 */
        }
        
        .archive-icon {
            color: #6366f1; /* indigo-500 */
        }
        
        .image-icon {
            color: #ec4899; /* pink-500 */
        }
        
        .code-icon {
            color: #3b82f6; /* blue-500 */
        }
        
        .text-icon {
            color: #64748b; /* slate-500 */
        }
        
        /* Toolbars and Dialogs */
        .toolbar {
            background: var(--toolbar-bg);
            backdrop-filter: var(--toolbar-blur);
            -webkit-backdrop-filter: var(--toolbar-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .toolbar.hidden {
            transform: translateY(100px);
            opacity: 0;
            pointer-events: none;
        }
        
        /* Dialogs */
        .dialog-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 999;
        }

        .dialog-content {
            background: var(--dialog-bg); 
            border-radius: 16px; /* Increased border-radius for softer look */
            padding: 24px; /* Increased padding */
            width: 90%; /* Wider on small screens */
            max-width: 400px; /* Slightly larger max-width */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2); /* Stronger shadow */
            transition: all 0.3s ease; /* Added transition for smooth appearance */
        }

        /* Dialog Title */
        .dialog-content h3 {
            font-size: 1.5rem; /* Larger title */
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        /* Dialog Input */
        .dialog-input {
            background: var(--input-bg);
            border: 1px solid var(--dialog-border);
            border-radius: 8px; /* Slightly smaller radius for inputs within dialogs */
            padding: 10px 14px; 
            font-size: 1rem;
            height: 44px; /* Taller input */
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        /* Dialog Button Container */
        .dialog-buttons {
            margin-top: 1.5rem;
            gap: 12px; /* Increased gap */
        }

        /* Dialog Buttons */
        .dialog-btn {
            padding: 10px 20px; /* Larger buttons */
            font-size: 1rem;
            border-radius: 10px; /* Larger radius for buttons */
        }

        /* Mobile Adaptation for Dialogs */
        @media (max-width: 480px) {
            .dialog-content {
                padding: 20px;
                max-width: 320px;
            }
            
            .dialog-input {
                padding: 8px 12px;
                height: 40px;
            }
            
            .dialog-btn {
                padding: 8px 16px;
            }
        }
        
        /* Loading Animation */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        
        /* Breadcrumb Navigation */
        .breadcrumb {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .breadcrumb-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: color 0.2s;
            color: var(--text-secondary); /* Default breadcrumb color */
        }
        
        .breadcrumb-item:hover {
            color: var(--primary-color);
        }

        .breadcrumb-item:last-child {
            color: var(--text-primary); /* Current path in primary color */
            font-weight: 600;
        }
        
        .breadcrumb-separator {
            margin: 0 8px;
            color: var(--text-secondary);
        }
        
        /* Context Menu */
        .context-menu {
            position: absolute;
            z-index: 1000;
            background: var(--context-menu-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            min-width: 200px;
            overflow: hidden;
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
            pointer-events: none;
            backdrop-filter: blur(8px); /* Added blur to context menu */
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
        }
        
        .context-menu.visible {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        
        .context-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
            color: var(--text-primary);
        }
        
        .context-menu-item:hover {
            background: var(--context-menu-hover-bg);
        }
        
        .context-menu-item i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .context-menu-divider {
            height: 1px;
            background: var(--context-menu-divider);
            margin: 4px 0;
        }
        
        /* Batch Operation Toolbar */
        .batch-toolbar {
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 12px; /* Increased gap */
            background: var(--primary-color); /* Primary color for batch toolbar */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            border-radius: 24px;
            padding: 12px 20px; /* Increased padding */
            color: white;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px); /* Initial transform for animation */
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            z-index: 1000;
            margin: 0 auto;
            width: fit-content;
            max-width: 90%;
        }
        
        .batch-toolbar.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        .batch-toolbar-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 12px;
            padding: 10px 16px; /* Increased padding */
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        
        .batch-toolbar-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .batch-toolbar-btn i {
            margin-right: 8px;
        }
        
        .batch-count {
            margin-right: 16px;
            display: flex;
            align-items: center;
        }
        
        /* User Menu */
        .user-menu {
            position: relative;
            display: inline-block;
        }
        
        .user-menu-btn {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .user-menu-content {
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 8px;
            background: var(--context-menu-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            border-radius: 12px;
            min-width: 180px;
            z-index: 1100;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            pointer-events: none;
           
        }
        
        .user-menu-content.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        .user-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
            color: var(--text-primary);
        }
        
        .user-menu-item:hover {
            background: var(--context-menu-hover-bg);
        }
        
        .user-menu-item i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .user-menu-divider {
            height: 1px;
            background: var(--context-menu-divider);
            margin: 4px 0;
        }
        
        /* Responsive Adjustments */
        @media (max-width: 640px) {
            .glass {
                border-radius: 12px;
            }
            
            .file-item {
                padding: 12px;
            }
            
            .toolbar {
                padding: 8px;
                border-radius: 20px;
            }
            
            .breadcrumb {
                font-size: 14px;
            }
            
            .batch-toolbar {
                bottom: 70px;
                padding: 6px 12px;
            }
            
            .batch-toolbar-btn {
                padding: 6px 8px;
                font-size: 14px;
            }
        }
        
        /* Custom Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }
        
        /* Build Status Notification */
        .build-status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            max-width: 300px;
            transition: transform 0.3s ease, opacity 0.3s ease;
            color: var(--text-primary);
        }
        
        .build-status.hidden {
            transform: translateY(-20px);
            opacity: 0;
            pointer-events: none;
        }
        
        /* Build App Context Menu Item Style */
        .context-build-app {
            color: #3b82f6; /* blue-500 */
        }

        /* Toast Message Styling */
        #toast {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            color: var(--text-primary);
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translate(-50%, 20px); /* Initial state for animation */
            opacity: 0;
            pointer-events: none;
            z-index: 1001;
        }

        #toast.show {
            transform: translate(-50%, 0);
            opacity: 1;
            pointer-events: auto;
        }

        /* Settings button */
        .settings-btn {
            background: var(--button-bg);
            border: 1px solid var(--button-border);
            color: var(--text-primary);
            transition: all 0.2s ease;
        }
        .settings-btn:hover {
            background: var(--button-hover-bg);
            transform: scale(1.05);
        }

        /* Toggle Switch for Dark Mode */
        .switch {
            position: relative;
            display: inline-block;
            width: 48px; /* Wider switch */
            height: 28px; /* Taller switch */
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 28px; /* Match height for rounded corners */
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px; /* Smaller circle */
            width: 20px; /* Smaller circle */
            left: 4px;
            bottom: 4px;
            background-color: white;
            -webkit-transition: .4s;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--primary-color);
        }

        input:focus + .slider {
            box-shadow: 0 0 1px var(--primary-color);
        }

        input:checked + .slider:before {
            -webkit-transform: translateX(20px); /* Move circle to the right */
            -ms-transform: translateX(20px);
            transform: translateX(20px);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">
    <!-- Authentication Screen -->
    <div id="auth-screen" class="flex flex-col items-center justify-center min-h-screen">
        <div class="glass-panel p-8 w-full max-w-md mx-auto relative">
            <div class="absolute top-4 right-4">
                <button id="auth-settings-btn" class="glass-btn p-2 rounded-full settings-btn" title="外观设置">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
            <div class="text-center mb-8">
                <i class="fab fa-github text-5xl mb-4" style="color: var(--primary-color);"></i>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">GitHub 文件管理器</h1>
                <p class="text-gray-600">使用您的 GitHub Token 登录</p>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 mb-2 font-medium">GitHub 个人访问令牌</label>
                <input type="password" id="github-token" placeholder="输入您的 GitHub Token" 
                       class="glass-input mb-1">
                <p id="token-error" class="text-red-500 text-sm hidden"></p>
            </div>
            
            <button id="auth-btn" class="glass-btn glass-btn-primary w-full py-3 font-medium flex items-center justify-center">
                <span id="auth-btn-text">认证并继续</span>
                <i id="auth-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
            </button>
            
            <div class="mt-8 text-sm text-gray-600">
                <p class="font-medium mb-2">如何获取 Token？</p>
                <ol class="list-decimal pl-5 space-y-1">
                    <li>登录 GitHub 账户</li>
                    <li>访问 <a href="https://github.com/settings/tokens" target="_blank" class="text-blue-500 hover:underline">开发者设置</a></li>
                    <li>创建新的个人访问令牌 (Classic)</li>
                    <li>勾选 <code class="bg-gray-200 px-1 rounded text-gray-700">repo</code> 权限</li>
                </ol>
            </div>
        </div>
    </div>
    
    <!-- Main Screen -->
    <div id="main-screen" class="hidden flex-col h-full max-w-6xl mx-auto w-full">
        <!-- Top Navigation Bar -->
        <div class="top-nav glass-panel flex items-center p-4 mb-4">
            <div id="current-path" class="text-lg font-semibold truncate flex-1">
                <div class="breadcrumb">
                    <div class="breadcrumb-item" onclick="loadRepositories()">
                        <i class="fab fa-github mr-1"></i>
                        <span>我的仓库</span>
                    </div>
                </div>
            </div>
            
            <!-- User Menu -->
            <div class="user-menu ml-4">
                <div id="user-menu-btn" class="user-menu-btn glass-btn p-2">
                    <i class="fas fa-user-circle text-lg"></i>
                </div>
                <div id="user-menu-content" class="user-menu-content">
                    <div id="user-info" class="user-menu-item">
                        <i class="fas fa-user"></i>
                        <span id="username"></span>
                    </div>
                    <div class="user-menu-divider"></div>
                    <div id="settings-menu-item" class="user-menu-item">
                        <i class="fas fa-cog"></i>
                        <span>外观设置</span>
                    </div>
                    <div class="user-menu-divider"></div>
                    <div id="logout-btn" class="user-menu-item">
                        <i class="fas fa-sign-out-alt text-red-500"></i>
                        <span class="text-red-500">退出登录</span>
                    </div>
                </div>
            </div>
        </div>

        
        <!-- File List Area -->
        <div class="flex-1 overflow-y-auto">
            <div id="loading" class="flex justify-center items-center h-64">

        // --- Utility Functions ---
        function handleScroll() {
            const currentScrollPosition = window.pageYOffset || document.documentElement.scrollTop;
            const scrollDelta = currentScrollPosition - lastScrollPosition;
            
            if (Math.abs(scrollDelta) < SCROLL_THRESHOLD) return;
            
            const scrollingDown = scrollDelta > 0;
            clearTimeout(scrollTimeout);
            
            if (lastScrollDirection !== scrollingDown) updateToolbarVisibility(scrollingDown);
            
            scrollTimeout = setTimeout(() => { isScrolling = false; showToolbar(); }, SCROLL_DELAY);
            
            if (!isScrolling || lastScrollDirection !== scrollingDown) {
                isScrolling = true;
                lastScrollDirection = scrollingDown;
                updateToolbarVisibility(scrollingDown);
            }
        }

            if (scrollingDown) hideToolbar();

        async function verifyToken(token = githubToken) {
            try {
                authBtnText.textContent = '认证中...';
                authSpinner.classList.remove('hidden');
                authBtn.disabled = true;
                
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch('https://api.github.com/user', {
                    signal: controller.signal,
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    let errorMessage = '认证失败';
                    if (response.status === 401) errorMessage = 'Token 无效或已过期';
                    else if (response.status === 403) errorMessage = '权限不足，请检查 Token 权限';
                    else errorMessage = `服务器错误: ${response.status}`;
                    throw new Error(errorMessage);
                }
                
                const userData = await response.json();
                githubToken = token;
                currentUser = userData;
                localStorage.setItem('github_token', token);
                showToast(`欢迎: ${userData.login || '用户'}！`);
                showMainScreen();
                loadRepositories();
                usernameElement.textContent = userData.login;
                
            } catch (error) {
                let errorMessage = error.message;
                if (error.name === 'AbortError') errorMessage = '请求超时，请检查网络连接';
                showTokenError(errorMessage);
                showToast(errorMessage);
            } finally {
                authBtnText.textContent = '认证并继续';
                authSpinner.classList.add('hidden');
                authBtn.disabled = false;
            }
        }
        
        function showTokenError(message) {
            tokenError.textContent = message;
            tokenError.classList.remove('hidden');
        }

        async function loadRepositories() {
            showLoading();
            currentPath = ''; currentRepo = '';
            updateBreadcrumb([]);
            
            backBtn.classList.add('hidden'); uploadBtn.classList.add('hidden');
            newFolderBtn.classList.add('hidden'); selectBtn.classList.add('hidden');
            staticSiteBtn.classList.add('hidden'); newRepoBtn.classList.remove('hidden');
            forkRepoBtn.classList.remove('hidden');
            
            try {
                const response = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: {
                        'Authorization': `bearer ${githubToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        query: `
                            query {
                                viewer {
                                    repositories(first: 100, ownerAffiliations: [OWNER], orderBy: {field: NAME, direction: ASC}) {
                                        nodes { name owner { login } isPrivate description updatedAt }
                                    }
                                }
                            }
                        `
                    })
                });
                
                if (!response.ok) throw new Error('获取仓库列表失败');
                
                const data = await response.json();
                const repos = data.data.viewer.repositories.nodes;
                
                renderFileList(repos.map(repo => ({
                    name: repo.name, type: 'repo', path: `${repo.owner.login}/${repo.name}`,
                    private: repo.isPrivate, description: repo.description, updatedAt: repo.updatedAt
                })));
            } catch (error) {
                console.error('加载仓库列表错误:', error);
                showToast('加载失败: ' + error.message);
                showEmptyState();
            }
        }
        
        async function loadRepositoryContents(repo, path = '') {
            showLoading();
            currentRepo = repo; currentPath = path;
            
            backBtn.classList.remove('hidden'); uploadBtn.classList.remove('hidden');
            newFolderBtn.classList.remove('hidden'); selectBtn.classList.remove('hidden');
            staticSiteBtn.classList.add('hidden'); newRepoBtn.classList.add('hidden');
            forkRepoBtn.classList.add('hidden');
            
            const pathParts = path ? path.split('/') : [];
            updateBreadcrumb([repo, ...pathParts]);
            
            try {
                const response = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: {
                        'Authorization': `bearer ${githubToken}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        query: `
                            query {
                                repository(owner: "${repo.split('/')[0]}", name: "${repo.split('/')[1]}") {
                                    object(expression: "HEAD:${path}") {
                                        ... on Tree {
                                            entries { name type object { ... on Blob { byteSize } } }
                                        }
                                    }
                                }
                            }
                        `
                    })
                });
                
                if (!response.ok) throw new Error('获取仓库内容失败');
                
                const data = await response.json();
                
                if (!data.data.repository.object) { showEmptyState(); return; }
                
                const contents = data.data.repository.object.entries.map(entry => ({
                    name: entry.name, type: entry.type === 'tree' ? 'dir' : 'file',
                    size: entry.object?.byteSize || 0, path: path ? `${path}/${entry.name}` : entry.name,
                    download_url: entry.type === 'blob' ? `https://raw.githubusercontent.com/${repo}/HEAD/${path ? path + '/' : ''}${entry.name}` : null
                }));
                
                currentFiles = contents;
                
                const sortedContents = [...contents].sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });
                
                renderFileList(sortedContents);
                
                const hasIndexHtml = contents.some(file => file.type === 'file' && file.name.toLowerCase() === 'index.html');
                if (hasIndexHtml) staticSiteBtn.classList.remove('hidden');
                else staticSiteBtn.classList.add('hidden');
            } catch (error) {
                console.error('加载仓库内容错误:', error);
                showToast('加载失败: ' + error.message);
                showEmptyState();
            }
        }

        function updateBreadcrumb(parts) {
            const breadcrumbContainer = currentPathElement.querySelector('.breadcrumb');
            breadcrumbContainer.innerHTML = '';
            
            const rootItem = document.createElement('div');
            rootItem.className = 'breadcrumb-item';
            rootItem.innerHTML = '<i class="fab fa-github mr-1"></i><span>我的仓库</span>';
            rootItem.onclick = loadRepositories;
            breadcrumbContainer.appendChild(rootItem);
            
            if (parts.length === 0) return;
            
            const separator1 = document.createElement('div');
            separator1.className = 'breadcrumb-separator';
            separator1.innerHTML = '<i class="fas fa-chevron-right"></i>';
            breadcrumbContainer.appendChild(separator1);
            
            const repoItem = document.createElement('div');
            repoItem.className = 'breadcrumb-item';
            repoItem.textContent = parts[0].split('/')[1] || parts[0]; // Display repo name only
            repoItem.onclick = () => loadRepositoryContents(parts[0]);
            breadcrumbContainer.appendChild(repoItem);
            
            let currentFullPath = parts[0];
            for (let i = 1; i < parts.length; i++) {
                currentFullPath += '/' + parts[i];
                
                const pathSeparator = document.createElement('div');
                pathSeparator.className = 'breadcrumb-separator';
                pathSeparator.innerHTML = '<i class="fas fa-chevron-right"></i>';
                breadcrumbContainer.appendChild(pathSeparator);
                
                const pathItem = document.createElement('div');
                pathItem.className = 'breadcrumb-item';
                pathItem.textContent = parts[i];
                const pathForClick = currentFullPath;
                pathItem.onclick = () => { loadRepositoryContents(parts[0], pathForClick.substring(parts[0].length + 1)); };
                breadcrumbContainer.appendChild(pathItem);
            }
        }

        function renderFileList(items) {
            fileListElement.innerHTML = '';
            loadingElement.classList.add('hidden');
            emptyStateElement.classList.add('hidden');
            
            if (items.length === 0) { showEmptyState(); return; }
            
            fileListElement.classList.remove('hidden');
            
            items.forEach(item => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item p-4 flex items-center';

        async function uploadSingleFile(file) {
            try {
                const base64Content = await readFileAsBase64(file);
                const filePath = currentPath ? `${currentPath}/${file.name}` : file.name;
                const encodedPath = encodeGitHubPath(filePath);
                const sha = await getFileShaIfExists(encodedPath);
                
                const uploadData = {
                    message: `Upload ${file.name}`,
                    content: base64Content,
                    ...(sha && { sha })
                };
                
                const response = await fetch(
                    `https://api.github.com/repos/${currentRepo}/contents/${encodedPath}`,
                    {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(uploadData)
                    }
                );
                
                if (!response.ok) {
                    const errorData = await response.json();
                    if (response.status === 403 && errorData.message.includes('API rate limit')) {
                        const resetTime = new Date(response.headers.get('x-ratelimit-reset') * 1000);
                        throw new Error(`API速率限制，请等待到 ${resetTime.toLocaleTimeString()}`);
                    }
                    throw new Error(errorData.message || '上传失败');
                }
                return { file: file.name, status: 'success' };
            } catch (error) {
                console.error(`文件 ${file.name} 上传失败:`, error);
                throw error;
            }
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const arrayBuffer = reader.result;
                    const binaryString = Array.from(new Uint8Array(arrayBuffer)).map(b => String.fromCharCode(b)).join('');
                    resolve(btoa(binaryString));
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsArrayBuffer(file);
            });
        }

        async function getFileShaIfExists(filePath) {

                );
                if (response.ok) { const data = await response.json(); return data.sha; }
                else if (response.status === 404) return null;
                else { const errorData = await response.json(); throw new Error(errorData.message || '检查文件状态失败'); }
            } catch (error) {
                console.error('获取SHA错误:', error);
                throw error;
            }
        }

        async function monitorBuildProgress(owner, repo) {
            clearInterval(buildTimer);
            
            let progress = 0;
            const progressInterval = setInterval(() => {
                if (progress < 95) {
                    progress += 5;
                    progressBar.style.width = `${progress}%`;
                    progressText.textContent = `${progress}%`;
                }
            }, 2000);
            
            buildTimer = setInterval(async () => {
                try {
                    const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?event=workflow_dispatch`, {
                        headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    
                    if (!response.ok) throw new Error('获取构建状态失败');
                    
                    const data = await response.json();
                    const latestRun = data.workflow_runs[0];
                    
                    if (!latestRun) return;
                    
                    buildStatus = latestRun.status;
                    
                    switch (latestRun.status) {
                        case 'completed':
                            clearInterval(progressInterval);
                            clearInterval(buildTimer);
                            if (latestRun.conclusion === 'success') {
                                progressBar.style.width = '100%'; progressText.textContent = '100%';
                                buildIcon.className = 'fas fa-check-circle text-green-500 mr-2';
                                buildMessage.innerHTML = '构建成功！<br>APK文件可在仓库的Artifacts中下载';
                            } else {
                                buildIcon.className = 'fas fa-times-circle text-red-500 mr-2';
                                buildMessage.textContent = `构建失败: ${latestRun.conclusion}`;
                            }
                            break;
                        case 'in_progress': buildMessage.textContent = '构建正在进行中...'; break;
                        case 'queued': buildMessage.textContent = '构建任务排队中...'; break;
                    }
                } catch (error) {
                    console.error('监控构建进度错误:', error);
                    clearInterval(progressInterval); clearInterval(buildTimer);
                    buildIcon.className = 'fas fa-times-circle text-red-500 mr-2';
                    buildMessage.textContent = '监控失败: ' + error.message;
                }
            }, 10000);
        }

        async function forkRepository(repoUrl) {
            try {
                const urlPattern = /https:\/\/github\.com\/([^\/]+)\/([^\/]+)/i;
                const match = repoUrl.match(urlPattern);
                
                if (!match || match.length < 3) throw new Error('无效的GitHub仓库URL');
                
                const owner = match[1]; const repo = match[2];
                
                showToast('正在复刻仓库...');
                hideForkRepoDialog();
                
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/forks`, {
                    method: 'POST',
                    headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                
                if (!response.ok) { const errorData = await response.json(); throw new Error(errorData.message || '复刻仓库失败'); }
                
                showToast('仓库复刻中，请稍后刷新查看...');
                setTimeout(() => { loadRepositories(); }, 30000); // Give GitHub time to process fork
            } catch (error) {
                console.error('复刻仓库错误:', error);
                showToast('复刻仓库失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
