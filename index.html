<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 文件管理器</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com/3.3.3"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* CSS 变量定义 */
        :root {
            /* Light Theme Defaults */
            --bg-start: #f3f4f6;
            --bg-end: #e5e7eb;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --glass-panel-bg: rgba(255, 255, 255, 0.25);
            --dialog-bg: rgba(255, 255, 255, 0.98);
            --dialog-border: rgba(0, 0, 0, 0.08);
            --dialog-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
            --context-menu-bg: rgba(255, 255, 255, 0.95);
            --context-menu-hover-bg: rgba(0, 0, 0, 0.05);
            --toolbar-bg: rgba(255, 255, 255, 0.2);
            --batch-toolbar-bg: rgba(79, 70, 229, 0.9);
            --batch-toolbar-btn-bg: rgba(255, 255, 255, 0.2);
            --batch-toolbar-btn-hover-bg: rgba(255, 255, 255, 0.3);
            --scrollbar-track: rgba(255, 255, 255, 0.2);
            --scrollbar-thumb: rgba(79, 70, 229, 0.5);
            --scrollbar-thumb-hover: rgba(79, 70, 229, 0.7);
            --primary-color: #4f46e5; /* Indigo-600 */
            --primary-color-dark: #4338ca; /* Indigo-700 */
            --primary-color-light: #6366f1; /* Indigo-500 */
            --red-color: #ef4444; /* Red-500 */
            --green-color: #22c55e; /* Green-500 */
            --blue-color: #3b82f6; /* Blue-500 */
            --purple-color: #a855f7; /* Purple-500 */
            --amber-color: #f59e0b; /* Amber-500 */
            --violet-color: #8b5cf6; /* Violet-500 */
            --emerald-color: #10b981; /* Emerald-500 */
        }

        /* Dark Theme Variables */
        html[data-theme="dark"] {
            --bg-start: #1a202c;
            --bg-end: #2d3748;
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --glass-bg: rgba(0, 0, 0, 0.3);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --glass-panel-bg: rgba(0, 0, 0, 0.4);
            --dialog-bg: rgba(45, 55, 72, 0.98);
            --dialog-border: rgba(255, 255, 255, 0.1);
            --dialog-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
            --context-menu-bg: rgba(45, 55, 72, 0.95);
            --context-menu-hover-bg: rgba(255, 255, 255, 0.1);
            --toolbar-bg: rgba(0, 0, 0, 0.3);
            --batch-toolbar-bg: rgba(79, 70, 229, 0.9); /* Keep primary color for batch */
            --batch-toolbar-btn-bg: rgba(255, 255, 255, 0.2);
            --batch-toolbar-btn-hover-bg: rgba(255, 255, 255, 0.3);
            --scrollbar-track: rgba(0, 0, 0, 0.2);
            --scrollbar-thumb: rgba(79, 70, 229, 0.5);
            --scrollbar-thumb-hover: rgba(79, 70, 229, 0.7);
            /* Icon colors might need adjustment for dark mode if they clash */
            --red-color: #ef4444;
            --green-color: #22c55e;
            --blue-color: #3b82f6;
            --purple-color: #a855f7;
            --amber-color: #f59e0b;
            --violet-color: #8b5cf6;
            --emerald-color: #10b981;
        }

        /* General Body Styles */
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 100px;
            margin: 0;
            background-attachment: fixed;
            background-size: cover; /* Ensure background image covers the body */
            background-position: center; /* Center the background image */
            transition: background-color 0.3s ease, color 0.3s ease; /* Smooth theme transition */
        }
        
        /* Force GPU Acceleration for common elements */
        .glass, .glass-panel, .glass-btn, .glass-input, .file-item, .toolbar, .dialog-content, .context-menu, .batch-toolbar, .user-menu-content, .build-status {
            will-change: transform, opacity, background-color, box-shadow;
            transform: translateZ(0); /* Force a new compositing layer */
            -webkit-font-smoothing: antialiased; /* Better font rendering */
            -moz-osx-font-smoothing: grayscale;
        }

        /* Top Navigation specific */
        .top-nav {
            position: relative;
            z-index: 1000;
        }
        
        /* Glassmorphism Effect */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 16px;
        }
        
        .glass-panel {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 16px;
        }
        
        /* Button Styles */
        .glass-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 16px 0 rgba(31, 38, 135, 0.1);
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            color: var(--text-primary);
            font-weight: 500;
        }
        
        .glass-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(31, 38, 135, 0.2);
            background: rgba(255, 255, 255, 0.35); /* Slightly more opaque on hover */
        }
        
        .glass-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px 0 rgba(31, 38, 135, 0.1);
        }
        
        .glass-btn-primary {
            background: var(--primary-color);
            color: white;
            border: 1px solid var(--primary-color-dark);
        }
        
        .glass-btn-primary:hover {
            background: var(--primary-color-dark);
        }
        
        /* Input Field Styles */
        .glass-input {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .glass-input:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.3);
            background: rgba(255, 255, 255, 0.35); /* Slightly more opaque on focus */
        }
        
        .glass-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }
        
        /* File List Item */
        .file-item {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .file-item:hover {
            background: rgba(255, 255, 255, 0.35); /* Slightly more opaque on hover */
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(31, 38, 135, 0.1);
        }
        
        .file-item.selected {
            background: rgba(79, 70, 229, 0.2);
            border-color: var(--primary-color-light);
        }
        
        /* File Type Icons */
        .file-icon {
            margin-right: 12px;
            filter: drop-shadow(1px 1px 2px rgba(0, 0, 0, 0.1));
        }
        
        .folder-icon { color: var(--amber-color); }
        .archive-icon { color: var(--primary-color-light); }
        .image-icon { color: #ec4899; } /* Pink-500 */
        .code-icon { color: var(--blue-color); }
        .text-icon { color: var(--text-secondary); }
        .pdf-icon { color: var(--red-color); }
        .word-icon { color: #2563eb; } /* Blue-700 */
        .excel-icon { color: #16a34a; } /* Green-700 */
        .powerpoint-icon { color: #ea580c; } /* Orange-700 */
        .csv-icon { color: #16a34a; }
        .database-icon { color: var(--blue-color); }
        .cog-icon { color: var(--text-secondary); }
        .key-icon { color: #facc15; } /* Yellow-500 */
        .font-icon { color: var(--purple-color); }
        .video-icon { color: #ef4444; } /* Red-500 */
        .audio-icon { color: #3b82f6; } /* Blue-500 */
        .lock-icon { color: var(--text-secondary); }
        .signature-icon { color: var(--text-secondary); }
        .docker-icon { color: #38bdf8; } /* Sky-400 */

        /* Toolbar */
        .toolbar {
            background: var(--toolbar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .toolbar.hidden {
            transform: translateY(100px);
            opacity: 0;
            pointer-events: none;
        }
        
        /* Dialogs */
        .dialog-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 999;
        }

        .dialog-content {
            background: var(--dialog-bg); 
            border-radius: 10px; 
            padding: 14px 16px; 
            width: 85%;
            max-width: 340px; 
            box-shadow: var(--dialog-shadow);
            color: var(--text-primary); /* Ensure dialog text is primary color */
        }

        .dialog-content h3 {
            font-size: 1.1rem;
            margin-bottom: 0.6rem;
            color: var(--text-primary);
        }

        .dialog-input {
            background: var(--glass-bg);
            border: 1px solid var(--dialog-border);
            border-radius: 5px;
            padding: 8px 12px; 
            font-size: 0.85rem;
            height: 36px; 
            margin-bottom: 0.6rem;
            color: var(--text-primary);
        }
        .dialog-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .dialog-buttons {
            margin-top: 0.8rem;
            gap: 6px; 
        }

        .dialog-btn {
            padding: 6px 12px;
            font-size: 0.85rem;
            border-radius: 5px;
        }

        /* Loading Spinner */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .animate-spin {
            animation: spin 1s linear infinite;
        }
        
        /* Breadcrumb Navigation */
        .breadcrumb {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .breadcrumb-item {
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: color 0.2s;
            color: var(--text-secondary);
        }
        
        .breadcrumb-item:hover {
            color: var(--primary-color);
        }
        
        .breadcrumb-separator {
            margin: 0 8px;
            color: var(--text-secondary);
        }
        
        /* Context Menu */
        .context-menu {
            position: absolute;
            z-index: 1000;
            background: var(--context-menu-bg);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            min-width: 200px;
            overflow: hidden;
            transform: scale(0.95);
            opacity: 0;
            transition: transform 0.2s ease, opacity 0.2s ease;
            pointer-events: none;
        }
        
        .context-menu.visible {
            transform: scale(1);
            opacity: 1;
            pointer-events: auto;
        }
        
        .context-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
            color: var(--text-primary);
        }
        
        .context-menu-item:hover {
            background: var(--context-menu-hover-bg);
        }
        
        .context-menu-item i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .context-menu-divider {
            height: 1px;
            background: rgba(0, 0, 0, 0.1);
            margin: 4px 0;
        }
        
        /* Batch Operations Toolbar */
        .batch-toolbar {
            position: fixed;
            bottom: 80px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            background: var(--batch-toolbar-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            border-radius: 24px;
            padding: 8px 16px;
            color: white;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 1000;
            margin: 0 auto;
            width: fit-content;
            max-width: 90%;
        }
        
        .batch-toolbar.visible {
            opacity: 1;
            pointer-events: auto;
        }
        
        .batch-toolbar-btn {
            background: var(--batch-toolbar-btn-bg);
            border: none;
            border-radius: 12px;
            padding: 8px 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.2s;
        }
        
        .batch-toolbar-btn:hover {
            background: var(--batch-toolbar-btn-hover-bg);
        }
        
        .batch-count {
            margin-right: 12px;
            display: flex;
            align-items: center;
        }
        
        /* User Menu */
        .user-menu {
            position: relative;
            display: inline-block;
        }
        
        .user-menu-btn {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .user-menu-content {
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 8px;
            background: var(--context-menu-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 12px;
            min-width: 180px;
            z-index: 1100;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.2s ease;
            pointer-events: none;
        }
        
        .user-menu-content.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        
        .user-menu-item {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
            color: var(--text-primary);
        }
        
        .user-menu-item:hover {
            background: var(--context-menu-hover-bg);
        }
        
        .user-menu-item i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .user-menu-divider {
            height: 1px;
            background: rgba(0, 0, 0, 0.1);
            margin: 4px 0;
        }
        
        /* Responsive Adjustments */
        @media (max-width: 640px) {
            .glass {
                border-radius: 12px;
            }
            
            .file-item {
                padding: 12px;
            }
            
            .toolbar {
                padding: 8px;
                border-radius: 20px;
            }
            
            .breadcrumb {
                font-size: 14px;
            }
            
            .batch-toolbar {
                bottom: 70px;
                padding: 6px 12px;
            }
            
            .batch-toolbar-btn {
                padding: 6px 8px;
                font-size: 14px;
            }

            .dialog-content {
                padding: 12px 14px;
                max-width: 300px;
            }
            
            .dialog-input {
                padding: 7px 10px;
                height: 34px;
            }
            
            .dialog-btn {
                padding: 5px 10px;
            }
        }
        
        /* Scrollbar Styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--scrollbar-thumb-hover);
        }
        
        /* Build Status Notification */
        .build-status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 2000;
            max-width: 300px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .build-status.hidden {
            transform: translateY(-20px);
            opacity: 0;
            pointer-events: none;
        }
        
        /* Build App Context Menu Item */
        .context-build-app {
            color: var(--blue-color);
        }

        /* Toast Message */
        #toast {
            background: var(--glass-panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            color: var(--text-primary);
        }

        /* Settings Dialog specific styles */
        #settings-dialog .dialog-content {
            max-width: 400px;
        }
        #settings-dialog .dialog-input {
            margin-bottom: 1rem;
        }
        #settings-dialog .dialog-buttons {
            margin-top: 1.5rem;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">
    <!-- 认证界面 -->
    <div id="auth-screen" class="flex flex-col items-center justify-center min-h-screen">
        <div class="glass-panel p-8 w-full max-w-md mx-auto">
            <div class="text-center mb-8">
                <i class="fab fa-github text-5xl mb-4" style="color: var(--primary-color);"></i>
                <h1 class="text-3xl font-bold text-gray-800 mb-2">GitHub 文件管理器</h1>
                <p class="text-gray-600">使用您的 GitHub Token 登录</p>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 mb-2 font-medium">GitHub 个人访问令牌</label>
                <input type="password" id="github-token" placeholder="输入您的 GitHub Token" 
                       class="glass-input mb-1">
                <p id="token-error" class="text-red-500 text-sm hidden"></p>
            </div>
            
            <button id="auth-btn" class="glass-btn glass-btn-primary w-full py-3 font-medium flex items-center justify-center">
                <span id="auth-btn-text">认证并继续</span>
                <i id="auth-spinner" class="fas fa-spinner fa-spin ml-2 hidden"></i>
            </button>
            
            <div class="mt-8 text-sm text-gray-600">
                <p class="font-medium mb-2">如何获取 Token？</p>
                <ol class="list-decimal pl-5 space-y-1">
                    <li>登录 GitHub 账户</li>
                    <li>访问 <a href="https://github.com/settings/tokens" target="_blank" class="text-blue-500 hover:underline">开发者设置</a></li>
                    <li>创建新的个人访问令牌 (Classic)</li>
                    <li>勾选 <code class="bg-gray-200 px-1 rounded text-xs">repo</code> 权限</li>
                    <li>复制生成的 Token</li>
                </ol>
            </div>
        </div>
    </div>
    
    <!-- 主界面 -->
    <div id="main-screen" class="hidden flex-col h-full max-w-6xl mx-auto w-full">
        <!-- 顶部导航栏 -->
        <div class="top-nav glass-panel flex items-center p-4 mb-4">
            <div id="current-path" class="text-lg font-semibold truncate flex-1">
                <div class="breadcrumb">
                    <div class="breadcrumb-item" onclick="loadRepositories()">
                        <i class="fab fa-github mr-1"></i>
                        <span>我的仓库</span>
                    </div>
                </div>
            </div>
            
            <!-- 用户菜单和设置按钮 -->
            <div class="flex items-center space-x-4">
                <button id="settings-btn" class="glass-btn p-2" title="设置">
                    <i class="fas fa-cog text-lg"></i>
                </button>
                <div class="user-menu">
                    <div id="user-menu-btn" class="user-menu-btn glass-btn p-2">
                        <i class="fas fa-user-circle text-lg"></i>
                    </div>
                    <div id="user-menu-content" class="user-menu-content">
                        <div id="user-info" class="user-menu-item">
                            <i class="fas fa-user"></i>
                            <span id="username"></span>
                        </div>
                        <div class="user-menu-divider"></div>
                        <div id="logout-btn" class="user-menu-item">
                            <i class="fas fa-sign-out-alt text-red-500"></i>
                            <span class="text-red-500">退出登录</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        
        <!-- 文件列表区域 -->
        <div class="flex-1 overflow-y-auto">
            <div id="loading" class="flex justify-center items-center h-64">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
            </div>
            
            <div id="file-list" class="grid gap-3 hidden">
                <!-- 动态生成的文件列表 -->
            </div>
            
            <div id="empty-state" class="hidden flex flex-col items-center justify-center h-64 text-gray-500">
                <i class="fas fa-folder-open text-5xl mb-4 opacity-50"></i>
                <p class="text-lg">当前目录为空</p>
            </div>
        </div>
        
        <!-- 底部工具栏 -->
        <div id="toolbar" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 flex gap-3 p-3 toolbar">
            <button id="back-btn" class="glass-btn p-3 hidden" title="返回">
                <i class="fas fa-arrow-left text-indigo-600"></i>
            </button>
            <button id="refresh-btn" class="glass-btn p-3" title="刷新">
                <i class="fas fa-sync-alt text-emerald-500"></i>
            </button>
            <button id="new-repo-btn" class="glass-btn p-3" title="新建仓库">
                <i class="fas fa-plus text-blue-500"></i>
            </button>
            <button id="fork-repo-btn" class="glass-btn p-3 hidden" title="复刻仓库">
                <i class="fas fa-code-branch text-purple-500"></i>
            </button>       
            <button id="new-folder-btn" class="glass-btn p-3 hidden" title="新建文件夹">
                <i class="fas fa-folder-plus text-amber-500"></i>
            </button>
            <button id="upload-btn" class="glass-btn p-3 hidden" title="上传文件">
                <i class="fas fa-upload text-violet-500"></i>
            </button>
            <button id="select-btn" class="glass-btn p-3 hidden" title="选择文件">
                <i class="fas fa-check-square text-blue-500"></i>
            </button>
            <!-- 添加静态网站按钮 -->
            <button id="static-site-btn" class="glass-btn p-3 hidden" title="托管静态网站">

        function formatFileSize(bytes) {

            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];

        function handleScroll() {
            const currentScrollPosition = window.pageYOffset || document.documentElement.scrollTop;
            const scrollDelta = currentScrollPosition - lastScrollPosition;
            if (Math.abs(scrollDelta) < SCROLL_THRESHOLD) return;
            const scrollingDown = scrollDelta > 0;
            lastScrollPosition = currentScrollPosition;
            clearTimeout(scrollTimeout);
            if (lastScrollDirection !== scrollingDown) {
                updateToolbarVisibility(scrollingDown);
            }
            scrollTimeout = setTimeout(() => {
                isScrolling = false;
                showToolbar();
            }, SCROLL_DELAY);
            if (!isScrolling || lastScrollDirection !== scrollingDown) {
                isScrolling = true;
                lastScrollDirection = scrollingDown;
                updateToolbarVisibility(scrollingDown);
            }
        }

        // --- API Interaction Functions ---
        async function verifyToken(token = githubToken) {
            try {
                DOMElements.authBtnText.textContent = '认证中...';
                DOMElements.authSpinner.classList.remove('hidden');
                DOMElements.authBtn.disabled = true;
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                const response = await fetch('https://api.github.com/user', {
                    signal: controller.signal,
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                clearTimeout(timeoutId);
                if (!response.ok) {
                    const errorData = await response.json();
                    let errorMessage = '认证失败';
                    if (response.status === 401) errorMessage = 'Token 无效或已过期';
                    else if (response.status === 403) errorMessage = '权限不足，请检查 Token 权限';
                    else errorMessage = `服务器错误: ${response.status}`;
                    throw new Error(errorMessage);
                }
                const userData = await response.json();
                githubToken = token;
                currentUser = userData;
                localStorage.setItem('github_token', token);
                showToast(`欢迎: ${userData.login || '用户'}！`);
                showMainScreen();
                loadRepositories();
                DOMElements.usernameElement.textContent = userData.login;
            } catch (error) {
                let errorMessage = error.message;
                if (error.name === 'AbortError') errorMessage = '请求超时，请检查网络连接';
                showTokenError(errorMessage);
                showToast(errorMessage);
            } finally {
                DOMElements.authBtnText.textContent = '认证并继续';
                DOMElements.authSpinner.classList.add('hidden');
                DOMElements.authBtn.disabled = false;
            }
        }

            DOMElements.tokenError.classList.add('hidden');

            showLoading();

            updateBreadcrumb([]);
            DOMElements.backBtn.classList.add('hidden');

            try {
                const response = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: { 'Authorization': `bearer ${githubToken}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({
                        query: `query { viewer { repositories(first: 100, ownerAffiliations: [OWNER], orderBy: {field: NAME, direction: ASC}) { nodes { name owner { login } isPrivate description updatedAt } } } }`
                    })
                });
                if (!response.ok) throw new Error('获取仓库列表失败');
                const data = await response.json();
                const repos = data.data.viewer.repositories.nodes;
                renderFileList(repos.map(repo => ({
                    name: repo.name, type: 'repo', path: `${repo.owner.login}/${repo.name}`, private: repo.isPrivate, description: repo.description, updatedAt: repo.updatedAt
                })));
            } catch (error) {

                showToast('加载失败: ' + error.message);
                showEmptyState();

        async function loadRepositoryContents(repo, path = '') {
            showLoading();
            currentRepo = repo;
            currentPath = path;
            DOMElements.backBtn.classList.remove('hidden');
            DOMElements.uploadBtn.classList.remove('hidden');
            DOMElements.newFolderBtn.classList.remove('hidden');
            DOMElements.selectBtn.classList.remove('hidden');
            DOMElements.staticSiteBtn.classList.add('hidden');
            DOMElements.newRepoBtn.classList.add('hidden');
            DOMElements.forkRepoBtn.classList.add('hidden');
            const pathParts = path ? path.split('/') : [];
            updateBreadcrumb([repo, ...pathParts]);
            try {
                const response = await fetch('https://api.github.com/graphql', {
                    method: 'POST',
                    headers: { 'Authorization': `bearer ${githubToken}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({
                        query: `query { repository(owner: "${repo.split('/')[0]}", name: "${repo.split('/')[1]}") { object(expression: "HEAD:${path}") { ... on Tree { entries { name type object { ... on Blob { byteSize } } } } } } }`
                    })
                });
                if (!response.ok) throw new Error('获取仓库内容失败');
                const data = await response.json();
                if (!data.data.repository.object) {
                    showEmptyState();
                    return;
                }
                const contents = data.data.repository.object.entries.map(entry => ({
                    name: entry.name, type: entry.type === 'tree' ? 'dir' : 'file', size: entry.object?.byteSize || 0, path: path ? `${path}/${entry.name}` : entry.name,
                    download_url: entry.type === 'blob' ? `https://raw.githubusercontent.com/${repo}/HEAD/${path ? path + '/' : ''}${entry.name}` : null
                }));
                currentFiles = contents;
                const sortedContents = [...contents].sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });
                renderFileList(sortedContents);
                const hasIndexHtml = contents.some(file => file.type === 'file' && file.name.toLowerCase() === 'index.html');
                if (hasIndexHtml) DOMElements.staticSiteBtn.classList.remove('hidden');
                else DOMElements.staticSiteBtn.classList.add('hidden');
            } catch (error) {
                console.error('加载仓库内容错误:', error);
                showToast('加载失败: ' + error.message);
                showEmptyState();
            }
        }

        async function deleteFile(fileInfo) {
            try {
                if (Array.isArray(fileInfo)) return deleteFiles(fileInfo);
                const shaResponse = await fetch(`https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${fileInfo.name}`, { headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (!shaResponse.ok) throw new Error('获取文件信息失败');
                const shaData = await shaResponse.json();
                const sha = shaData.sha;
                const deleteResponse = await fetch(`https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${fileInfo.name}`, {
                    method: 'DELETE', headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ message: `Delete ${fileInfo.name}`, sha: sha })
                });
                if (!deleteResponse.ok) { const errorData = await deleteResponse.json(); throw new Error(errorData.message || '删除文件失败'); }
                showToast('文件删除成功');
                loadRepositoryContents(currentRepo, currentPath);
            } catch (error) {
                console.error('删除文件错误:', error);
                showToast('删除文件失败: ' + error.message);
            }
        }

        async function deleteFiles(files) {
            let successCount = 0;
            let failCount = 0;
            for (const file of files) {
                try {
                    const shaResponse = await fetch(`https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${file.name}`, { headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' } });
                    if (!shaResponse.ok) throw new Error('获取文件信息失败');
                    const shaData = await shaResponse.json();
                    const sha = shaData.sha;
                    const deleteResponse = await fetch(`https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${file.name}`, {
                        method: 'DELETE', headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' },
                        body: JSON.stringify({ message: `Delete ${file.name}`, sha: sha })
                    });
                    if (!deleteResponse.ok) throw new Error('删除文件失败');
                    successCount++;
                } catch (error) {
                    console.error(`删除文件 ${file.name} 失败:`, error);
                    failCount++;
                }
            }
            if (failCount === 0) showToast(`成功删除 ${successCount} 个文件`);
            else showToast(`删除完成: ${successCount} 成功, ${failCount} 失败`);
            exitSelectMode();
            loadRepositoryContents(currentRepo, currentPath);
        }

        async function renameFile(fileInfo) {
            try {
                const contentResponse = await fetch(`https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${fileInfo.name}`, { headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (!contentResponse.ok) throw new Error('获取文件内容失败');
                const contentData = await contentResponse.json();
                const sha = contentData.sha;
                const content = contentData.content;
                const encoding = contentData.encoding;
                const newName = prompt('请输入新的文件名:', fileInfo.name);
                if (!newName || newName === fileInfo.name) return;
                const deleteResponse = await fetch(`https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${fileInfo.name}`, {
                    method: 'DELETE', headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ message: `Rename ${fileInfo.name} to ${newName}`, sha: sha })
                });
                if (!deleteResponse.ok) throw new Error('删除原文件失败');
                const createResponse = await fetch(`https://api.github.com/repos/${currentRepo}/contents/${currentPath ? currentPath + '/' : ''}${newName}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' },
                    body: JSON.stringify({ message: `Rename ${fileInfo.name} to ${newName}`, content: content, encoding: encoding })
                });
                if (createResponse.ok) { showToast('文件重命名成功'); loadRepositoryContents(currentRepo, currentPath); }
                else { const errorData = await createResponse.json(); throw new Error(errorData.message || '创建新文件失败'); }
            } catch (error) {
                console.error('重命名文件错误:', error);
                showToast('重命名文件失败: ' + error.message);
            }
        }

        async function uploadSelectedFile() {
            if (!DOMElements.fileInput.files || DOMElements.fileInput.files.length === 0) {
                showToast('请先选择文件');
                return;
            }
            try {
                const files = Array.from(DOMElements.fileInput.files);
                let successfulUploads = 0;
                let failedUploads = 0;
                const progressToast = document.createElement('div');
                progressToast.id = 'upload-progress';
                progressToast.className = 'fixed bottom-20 left-1/2 transform -translate-x-1/2 glass-panel px-6 py-3 rounded-full text-sm font-medium';
                progressToast.innerHTML = `准备上传 ${files.length} 个文件...`;
                document.body.appendChild(progressToast);
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    try {
                        progressToast.innerHTML = `正在上传 ${i+1}/${files.length}: ${file.name}...`;
                        await uploadSingleFile(file);
                        successfulUploads++;
                        if (i < files.length - 1) await new Promise(resolve => setTimeout(resolve, 500));
                    } catch (error) {
                        console.error(`文件 ${file.name} 上传失败:`, error);
                        failedUploads++;
                        if (error.message.includes('API rate limit')) {
                            progressToast.innerHTML = `遇到速率限制，等待60秒后继续...`;
                            await new Promise(resolve => setTimeout(resolve, 60000));
                            i--;
                            continue;
                        }
                        continue;
                    }
                }
                document.body.removeChild(progressToast);
                if (failedUploads === 0) showToast(`成功上传 ${successfulUploads} 个文件`);
                else showToast(`上传完成: ${successfulUploads} 成功, ${failedUploads} 失败`);
                loadRepositoryContents(currentRepo, currentPath);
            } catch (error) {
                console.error('上传过程中发生错误:', error);
                showToast('上传过程中发生错误: ' + error.message);
            } finally {
                DOMElements.fileInput.value = '';
            }
        }

        async function uploadSingleFile(file) {
            try {
                const base64Content = await readFileAsBase64(file);
                const filePath = currentPath ? `${currentPath}/${file.name}` : file.name;
                const encodedPath = encodeGitHubPath(filePath);
                const sha = await getFileShaIfExists(encodedPath);
                const uploadData = { message: `Upload ${file.name}`, content: base64Content, ...(sha && { sha }) };
                const response = await fetch(`https://api.github.com/repos/${currentRepo}/contents/${encodedPath}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify(uploadData)
                });
                if (!response.ok) {
                    const errorData = await response.json();
                    if (response.status === 403 && errorData.message.includes('API rate limit')) {
                        const resetTime = new Date(response.headers.get('x-ratelimit-reset') * 1000);
                        throw new Error(`API速率限制，请等待到 ${resetTime.toLocaleTimeString()}`);
                    }
                    throw new Error(errorData.message || '上传失败');
                }
                return { file: file.name, status: 'success' };
            } catch (error) {
                console.error(`文件 ${file.name} 上传失败:`, error);
                throw error;
            }
        }

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const arrayBuffer = reader.result;
                    const binaryString = Array.from(new Uint8Array(arrayBuffer)).map(b => String.fromCharCode(b)).join('');
                    resolve(btoa(binaryString));
                };
                reader.onerror = () => reject(new Error('文件读取失败'));
                reader.readAsArrayBuffer(file);
            });
        }

        async function getFileShaIfExists(filePath) {
            try {
                const response = await fetch(`https://api.github.com/repos/${currentRepo}/contents/${filePath}`, {
                    headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Cache-Control': 'no-cache' }
                });
                if (response.ok) { const data = await response.json(); return data.sha; }
                else if (response.status === 404) return null;
                else { const errorData = await response.json(); throw new Error(errorData.message || '检查文件状态失败'); }
            } catch (error) {
                console.error('获取SHA错误:', error);
                throw error;
            }
        }

        async function forkRepository(repoUrl) {
            try {
                const urlPattern = /https:\/\/github\.com\/([^\/]+)\/([^\/]+)/i;
                const match = repoUrl.match(urlPattern);
                if (!match || match.length < 3) throw new Error('无效的GitHub仓库URL');
                const owner = match[1];
                const repo = match[2];
                showToast('正在复刻仓库...');
                hideForkRepoDialog();
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/forks`, {
                    method: 'POST', headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (!response.ok) { const errorData = await response.json(); throw new Error(errorData.message || '复刻仓库失败'); }
                showToast('仓库复刻中，请稍后刷新查看...');
                setTimeout(() => { loadRepositories(); }, 30000);
            } catch (error) {
                console.error('复刻仓库错误:', error);
                showToast('复刻仓库失败: ' + error.message);
            }
        }

        // --- Event Handlers ---
        function handleAuth() {
            const token = DOMElements.githubTokenInput.value.trim();
            if (!token) { showTokenError('请输入 GitHub Token'); return; }
            if (token.length !== 40 && token !== '********') { showTokenError('Token 应为 40 位字符'); return; }
            verifyToken(token);
        }

        function handleConfirmYes() {
            if (fileToDelete) {
                if (Array.isArray(fileToDelete)) deleteFiles(fileToDelete);
                else if (fileToDelete.type === 'repo') deleteRepository(fileToDelete);
                else deleteFile(fileToDelete);
            }
            hideConfirmDialog();
        }

        function handleCreateFolder() {
            const folderName = DOMElements.newFolderName.value.trim();
            if (folderName) { createFolder(folderName); hideNewFolderDialog(); }
            else showToast('请输入文件夹名称');
        }

        function handleCreateRepo() {
            const repoName = DOMElements.newRepoName.value.trim();
            if (repoName) { createRepository(repoName, DOMElements.newRepoDesc.value.trim(), DOMElements.newRepoPrivate.checked); hideNewRepoDialog(); }
            else showToast('请输入仓库名称');
        }

        function handleForkRepo() {
            const repoUrl = DOMElements.forkRepoUrl.value.trim();
            if (repoUrl) forkRepository(repoUrl);
            else showToast('请输入GitHub仓库URL');
        }

        function handleUploadFile() {
            if (DOMElements.fileInput.files.length > 0) { uploadSelectedFile(); hideUploadDialog(); }
            else showToast('请选择要上传的文件');
        }

        function handleDeleteSelected() {
            if (selectedFiles.size > 0) {
                showConfirmDialog('确认删除', `您确定要删除选中的 ${selectedFiles.size} 个文件吗？此操作不可撤销。`, Array.from(selectedFiles));
            }
        }

        function handleCopyRawLink() {
            if (contextMenuTarget && contextMenuTarget.type === 'file') {
                copyToClipboard(contextMenuTarget.download_url, 'Raw 链接已复制');
            }
            hideContextMenu();
        }

        function handleCopyProxyLink() {
            if (contextMenuTarget && contextMenuTarget.type === 'file') {
                const [owner, repoName] = currentRepo.split('/');
                const filePath = currentPath ? `${currentPath}/${contextMenuTarget.name}` : contextMenuTarget.name;
                const jsdelivrLink = `https://cdn.jsdelivr.net/gh/${owner}/${repoName}@HEAD/${filePath}`;
                copyToClipboard(jsdelivrLink, 'jsDelivr CDN 链接已复制');
            }
            hideContextMenu();
        }

        function handleDeleteContextItem() {
            if (contextMenuTarget) {
                if (contextMenuTarget.type === 'repo') {
                    showConfirmDialog('确认删除仓库', `您确定要删除仓库 "${contextMenuTarget.name}" 吗？此操作不可撤销且会删除所有仓库内容。`, contextMenuTarget);
                } else {
                    showConfirmDialog('确认删除', `您确定要删除 "${contextMenuTarget.name}" 吗？此操作不可撤销。`, contextMenuTarget);
                }
            }
            hideContextMenu();
        }

        function handleBack() {
            if (!currentPath) {
                loadRepositories();
                return;
            }
            const pathParts = currentPath.split('/');
            pathParts.pop();
            const newPath = pathParts.join('/');
            if (pathParts.length === 0) {
                loadRepositoryContents(currentRepo);
            } else {
                loadRepositoryContents(currentRepo, newPath);
            }
        }

        function handleRefresh() {
            if (currentRepo) {
                loadRepositoryContents(currentRepo, currentPath);
            } else {
                loadRepositories();
            }
        }

        // --- Rendering Functions ---
        function updateBreadcrumb(parts) {
            const breadcrumbContainer = DOMElements.currentPathElement.querySelector('.breadcrumb');
            breadcrumbContainer.innerHTML = '';
            const rootItem = document.createElement('div');
            rootItem.className = 'breadcrumb-item';
            rootItem.innerHTML = '<i class="fab fa-github mr-1"></i><span>我的仓库</span>';
            rootItem.onclick = () => loadRepositories();
            breadcrumbContainer.appendChild(rootItem);
            if (parts.length === 0) return;
            const separator = document.createElement('div');
            separator.className = 'breadcrumb-separator';
            separator.innerHTML = '<i class="fas fa-chevron-right"></i>';
            breadcrumbContainer.appendChild(separator);
            const repoItem = document.createElement('div');
            repoItem.className = 'breadcrumb-item';
            repoItem.textContent = parts[0];
            repoItem.onclick = () => loadRepositoryContents(parts[0]);
            breadcrumbContainer.appendChild(repoItem);
            let currentPathAccumulated = parts[0];
            for (let i = 1; i < parts.length; i++) {
                currentPathAccumulated += '/' + parts[i];
                const pathSeparator = document.createElement('div');
                pathSeparator.className = 'breadcrumb-separator';
                pathSeparator.innerHTML = '<i class="fas fa-chevron-right"></i>';
                breadcrumbContainer.appendChild(pathSeparator);
                const pathItem = document.createElement('div');
                pathItem.className = 'breadcrumb-item';
                pathItem.textContent = parts[i];
                const pathForClick = currentPathAccumulated; // Capture current state
                pathItem.onclick = () => {
                    // Split the full path to get owner/repo and then the subpath
                    const [ownerRepo, ...subpathParts] = pathForClick.split('/');
                    loadRepositoryContents(ownerRepo, subpathParts.join('/'));
                };
                breadcrumbContainer.appendChild(pathItem);
            }
        }
        
        function renderFileList(items) {
            DOMElements.fileListElement.innerHTML = '';
            DOMElements.loadingElement.classList.add('hidden');
            DOMElements.emptyStateElement.classList.add('hidden');
            if (items.length === 0) {
                showEmptyState();
                return;
            }
            DOMElements.fileListElement.classList.remove('hidden');
            items.forEach(item => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item p-4 flex items-center';
                fileItem.dataset.name = item.name;
                fileItem.dataset.type = item.type;
                fileItem.addEventListener('contextmenu', (e) => showContextMenu(e, item));
                fileItem.addEventListener('click', (e) => {
                    if (DOMElements.batchToolbar.classList.contains('visible')) {
                        e.stopPropagation();
                        toggleFileSelection(fileItem, item);
                        return;
                    }
                    if (item.type === 'dir') {
                        loadRepositoryContents(currentRepo, `${currentPath ? currentPath + '/' : ''}${item.name}`);
                    } else if (item.type === 'repo') {
                        loadRepositoryContents(item.path);
                    } else if (item.type === 'file' && item.download_url) {
                        window.open(item.download_url, '_blank');
                    }
                });
                const icon = document.createElement('i');
                icon.className = `file-icon ${item.type === 'dir' ? 'fas fa-folder folder-icon' : 
                                     item.type === 'repo' ? 'fab fa-github text-gray-700' : 
                                     getFileIcon(item.name)}`;
                const infoContainer = document.createElement('div');
                infoContainer.className = 'flex-1 min-w-0';
                const name = document.createElement('div');
                name.className = 'font-medium truncate';
                name.textContent = item.name;
                const meta = document.createElement('div');
                meta.className = 'text-xs text-gray-500 truncate';
                if (item.type === 'repo') {
                    meta.textContent = item.private ? '私有仓库' : '公开仓库';
                    if (item.description) meta.textContent += ' • ' + item.description;
                    if (item.updatedAt) meta.textContent += ' • 更新: ' + formatDate(item.updatedAt);
                } else if (item.type === 'file') {
                    meta.textContent = formatFileSize(item.size) + (item.download_url ? ' • 点击查看' : '');
                } else {
                    meta.textContent = '文件夹 • 点击进入';
                }
                infoContainer.appendChild(name);
                infoContainer.appendChild(meta);
                const actionContainer = document.createElement('div');
                actionContainer.className = 'flex items-center ml-4';
                if (item.type === 'file') {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.className = 'glass-btn p-2 ml-2';
                    deleteBtn.innerHTML = '<i class="fas fa-trash text-red-500"></i>';
                    deleteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showConfirmDialog('确认删除', `您确定要删除文件 "${item.name}" 吗？此操作不可撤销。`, item);
                    });
                    const copyRawLinkBtn = document.createElement('button');
                    copyRawLinkBtn.className = 'glass-btn p-2 ml-2';
                    copyRawLinkBtn.innerHTML = '<i class="fas fa-link text-blue-500"></i>';
                    copyRawLinkBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (item.type === 'file') copyToClipboard(item.download_url, 'Raw 链接已复制');
                    });
                    const copyProxyLinkBtn = document.createElement('button');
                    copyProxyLinkBtn.className = 'glass-btn p-2 ml-2';
                    copyProxyLinkBtn.innerHTML = '<i class="fas fa-share-alt text-green-500"></i>';
                    copyProxyLinkBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (item.type === 'file') {
                            const [owner, repoName] = currentRepo.split('/');
                            const filePath = currentPath ? `${currentPath}/${item.name}` : item.name;
                            const jsdelivrLink = `https://cdn.jsdelivr.net/gh/${owner}/${repoName}@HEAD/${filePath}`;
                            copyToClipboard(jsdelivrLink, 'jsDelivr CDN 链接已复制');
                        }
                    });
                    actionContainer.appendChild(copyProxyLinkBtn);
                    actionContainer.appendChild(copyRawLinkBtn);
                    actionContainer.appendChild(deleteBtn);
                }
                fileItem.appendChild(icon);
                fileItem.appendChild(infoContainer);
                fileItem.appendChild(actionContainer);
                DOMElements.fileListElement.appendChild(fileItem);
            });
        }

        function toggleFileSelection(fileItem, fileInfo) {
            if (fileItem.classList.contains('selected')) {
                fileItem.classList.remove('selected');
                selectedFiles.delete(fileInfo);
            } else {
                fileItem.classList.add('selected');
                selectedFiles.add(fileInfo);
            }
            updateSelectedCount();
            if (selectedFiles.size === 0) exitSelectMode();
        }
        
        function downloadSelectedFiles() {
            if (selectedFiles.size === 0) return;
            if (selectedFiles.size === 1) {
                const file = selectedFiles.values().next().value;
                downloadFile(file);
                return;
            }
            showToast(`开始下载 ${selectedFiles.size} 个文件...`);
            let count = 0;
            selectedFiles.forEach(file => {
                if (file.type === 'file' && file.download_url) {
                    const link = document.createElement('a');
                    link.href = file.download_url;
                    link.download = file.name;
                    link.style.display = 'none';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    count++;
                }
            });
            showToast(`已开始下载 ${count} 个文件`);
            exitSelectMode();
        }

        function downloadFile(file) {
            if (file.type !== 'file' || !file.download_url) return;
            const link = document.createElement('a');
            link.href = file.download_url;
            link.download = file.name;
            link.style.display = 'none';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showToast(`已开始下载 ${file.name}`);
        }

        // --- GitHub Pages & Build App Functions ---
        function showStaticSiteDialog(repoInfo = null) {
            const targetRepo = repoInfo ? repoInfo.path : currentRepo;
            checkPagesStatus(targetRepo);
            showDialog(DOMElements.staticSiteDialog, DOMElements.staticSiteContent);
        }

        function hideStaticSiteDialog() {
            hideDialog(DOMElements.staticSiteDialog, DOMElements.staticSiteContent);
        }

        async function checkPagesStatus(repo) {
            try {
                const [owner, repoName] = repo.split('/');
                const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}/pages`, {
                    headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'built' || data.status === 'building') {
                        DOMElements.pagesStatus.classList.remove('hidden');
                        DOMElements.staticSiteEnable.classList.add('hidden');
                        DOMElements.pagesUrl.href = data.html_url;
                        DOMElements.pagesUrl.textContent = data.html_url;
                        DOMElements.pagesBranch.value = data.source.branch;
                        DOMElements.pagesFolder.value = data.source.path === '/docs' ? '/docs' : '/';
                    } else {
                        DOMElements.pagesStatus.classList.add('hidden');
                        DOMElements.staticSiteEnable.classList.remove('hidden');
                    }
                } else {
                    DOMElements.pagesStatus.classList.add('hidden');
                    DOMElements.staticSiteEnable.classList.remove('hidden');
                }
            } catch (error) {
                console.error('检查Pages状态错误:', error);
                DOMElements.pagesStatus.classList.add('hidden');
                DOMElements.staticSiteEnable.classList.remove('hidden');
            }
        }

        async function enableGitHubPages() {
            try {
                const [owner, repoName] = currentRepo.split('/');
                const branch = DOMElements.pagesBranch.value;
                const path = DOMElements.pagesFolder.value === '/docs' ? '/docs' : '/';
                const response = await fetch(`https://api.github.com/repos/${owner}/${repoName}/pages`, {
                    method: 'POST', headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source: { branch: branch, path: path } })
                });
                if (response.ok) {
                    showToast('静态网站已启用，构建可能需要几分钟');
                    hideStaticSiteDialog();
                    setTimeout(() => { checkPagesStatus(currentRepo); }, 5000);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || '启用静态网站失败');
                }
            } catch (error) {
                console.error('启用静态网站错误:', error);
                showToast('启用静态网站失败: ' + error.message);
            }
        }
        
        async function buildApp(repoInfo) {
            try {
                const [owner, repo] = repoInfo.path.split('/');
                DOMElements.buildStatusEl.classList.remove('hidden');
                DOMElements.buildIcon.className = 'fas fa-cog animate-spin text-blue-500 mr-2';
                DOMElements.buildMessage.textContent = '正在启动构建任务...';
                DOMElements.progressBar.style.width = '0%';
                DOMElements.progressText.textContent = '0%';
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/test.yml/dispatches`, {
                    method: 'POST', headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: 'main', inputs: { environment: 'production', version: '1.0.0' } })
                });
                if (response.status === 204) {
                    DOMElements.buildMessage.textContent = '构建任务已启动！正在监控进度...';
                    monitorBuildProgress(owner, repo);
                } else {
                    const errorData = await response.json();
                    throw new Error(errorData.message || '触发构建失败');
                }
            } catch (error) {
                console.error('构建APP错误:', error);
                DOMElements.buildIcon.className = 'fas fa-times-circle text-red-500 mr-2';
                DOMElements.buildMessage.textContent = '构建失败: ' + error.message;
            }
        }
        
        async function monitorBuildProgress(owner, repo) {
            clearInterval(buildTimer);
            let progress = 0;
            const progressInterval = setInterval(() => {
                if (progress < 95) {
                    progress += 5;
                    DOMElements.progressBar.style.width = `${progress}%`;
                    DOMElements.progressText.textContent = `${progress}%`;
                }
            }, 2000);
            buildTimer = setInterval(async () => {
                try {
                    const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?event=workflow_dispatch`, {
                        headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (!response.ok) throw new Error('获取构建状态失败');
                    const data = await response.json();
                    const latestRun = data.workflow_runs[0];
                    if (!latestRun) return;
                    buildStatus = latestRun.status;
                    switch (latestRun.status) {
                        case 'completed':
                            clearInterval(progressInterval);
                            clearInterval(buildTimer);
                            if (latestRun.conclusion === 'success') {
                                DOMElements.progressBar.style.width = '100%';
                                DOMElements.progressText.textContent = '100%';
                                DOMElements.buildIcon.className = 'fas fa-check-circle text-green-500 mr-2';
                                DOMElements.buildMessage.innerHTML = '构建成功！<br>APK文件可在仓库的Artifacts中下载';
                            } else {
                                DOMElements.buildIcon.className = 'fas fa-times-circle text-red-500 mr-2';
                                DOMElements.buildMessage.textContent = `构建失败: ${latestRun.conclusion}`;
                            }
                            break;
                        case 'in_progress': DOMElements.buildMessage.textContent = '构建正在进行中...'; break;
                        case 'queued': DOMElements.buildMessage.textContent = '构建任务排队中...'; break;
                    }
                } catch (error) {
                    console.error('监控构建进度错误:', error);
                    clearInterval(progressInterval);
                    clearInterval(buildTimer);
                    DOMElements.buildIcon.className = 'fas fa-times-circle text-red-500 mr-2';
                    DOMElements.buildMessage.textContent = '监控失败: ' + error.message;
                }
            }, 10000);
        }
